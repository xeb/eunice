<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💎</text></svg>">
    <title>EUNICE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
/* ============================================================================
   UI v2 shell — tokens, top cockpit bar, and view scaffolding (prepended).
   The legacy stylesheet below is progressively re-themed / removed in Tasks 2–5;
   these shell selectors are new and unique, so they take effect immediately.
   ============================================================================ */
:root{
  /* light = white page + solid bright golden-yellow nav band */
  --paper:#ffffff; --panel:#ffffff; --panel-2:#fdf6e4;
  --ink:#1b1a15; --ink-2:#494336; --muted:#8b8573;
  --line:rgba(27,26,21,.12); --line-2:rgba(27,26,21,.05);
  --nav:#f4c22e; --nav-ink:#2b2410; --nav-border:rgba(43,36,16,.22);
  --accent:#e0a200; --accent-ink:#a97400; --accent-wash:rgba(224,162,0,.15);
  --gilt:#f4c22e;
  --btn-bg:#1b1a15; --btn-fg:#f4c22e; --btn-bg-hover:#000000;
  --ok:#3f7a4b; --warn:#b5771a; --err:#a4302a; --cool:#2f6c62;
  --grid:rgba(27,26,21,.035);
  --shadow:0 1px 0 rgba(27,26,21,.04), 0 10px 26px -18px rgba(27,26,21,.30);
  --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:'IBM Plex Sans',system-ui,-apple-system,Segoe UI,sans-serif;
}
:root[data-theme="dark"]{
  /* dark = gilded band on deep sacristy black */
  --paper:#14110b; --panel:#1d170e; --panel-2:#241c11;
  --ink:#f4ecd6; --ink-2:#cebf9d; --muted:#948566;
  --line:rgba(244,236,214,.14); --line-2:rgba(244,236,214,.06);
  --nav:#e2bd3f; --nav-ink:#20190a; --nav-border:rgba(0,0,0,.34);
  --accent:#efc850; --accent-ink:#f0d072; --accent-wash:rgba(239,200,80,.16);
  --gilt:#f4d778;
  --btn-bg:#efc850; --btn-fg:#241b06; --btn-bg-hover:#f4d778;
  --ok:#5fae6c; --warn:#cf9a38; --err:#d1544e; --cool:#7cb8ad;
  --grid:rgba(244,236,214,.05);
  --shadow:0 1px 0 rgba(0,0,0,.5), 0 14px 34px -18px rgba(0,0,0,.82);
}
@media (prefers-color-scheme:dark){
  :root:not([data-theme="light"]){
    --paper:#14110b; --panel:#1d170e; --panel-2:#241c11;
    --ink:#f4ecd6; --ink-2:#cebf9d; --muted:#948566;
    --line:rgba(244,236,214,.14); --line-2:rgba(244,236,214,.06);
    --nav:#e2bd3f; --nav-ink:#20190a; --nav-border:rgba(0,0,0,.34);
    --accent:#efc850; --accent-ink:#f0d072; --accent-wash:rgba(239,200,80,.16);
    --gilt:#f4d778;
    --btn-bg:#efc850; --btn-fg:#241b06; --btn-bg-hover:#f4d778;
    --ok:#5fae6c; --warn:#cf9a38; --err:#d1544e; --cool:#7cb8ad;
    --grid:rgba(244,236,214,.05);
    --shadow:0 1px 0 rgba(0,0,0,.5), 0 14px 34px -18px rgba(0,0,0,.82);
  }
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:var(--paper);
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:23px 23px;
  color:var(--ink); font-family:var(--sans); font-size:15px; line-height:1.55;
  -webkit-font-smoothing:antialiased; display:flex; flex-direction:column; min-height:100%;
  overflow-x:hidden;
}
button{font-family:inherit; cursor:pointer}
a{color:inherit}
::selection{background:var(--accent-wash)}

/* ---------- top cockpit bar ---------- */
.topbar{
  position:sticky; top:0; z-index:50;
  display:flex; align-items:center; gap:22px;
  padding:0 20px; height:56px;
  background:var(--nav);            /* SOLID, opaque — content never shows through */
  border-bottom:1px solid var(--nav-border);
}
.brand{display:flex; align-items:baseline; gap:1px; font-family:var(--mono); font-weight:700;
  font-size:15px; letter-spacing:.34em; color:var(--nav-ink); text-decoration:none; white-space:nowrap; user-select:none}
.brand .caret{width:.5ch; height:1.05em; background:var(--nav-ink); display:inline-block; margin-left:.25em;
  transform:translateY(.12em); animation:blink 1.1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}

nav.tabs{display:flex; gap:2px; margin-left:2px}
.tab{
  position:relative; background:none; border:0; padding:8px 12px 10px;
  font-family:var(--mono); font-size:12px; font-weight:500; letter-spacing:.08em; text-transform:uppercase;
  color:color-mix(in srgb,var(--nav-ink) 60%,transparent); border-radius:6px 6px 0 0;
}
.tab:hover{color:var(--nav-ink)}
.tab .u{position:absolute; left:12px; right:12px; bottom:-1px; height:2px; background:var(--nav-ink);
  transform:scaleX(0); transform-origin:center; transition:transform .22s cubic-bezier(.2,.7,.2,1)}
.tab[aria-current="page"]{color:var(--nav-ink); font-weight:700}
.tab[aria-current="page"] .u{transform:scaleX(1)}

.spacer{flex:1}
.status{display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:12px;
  color:color-mix(in srgb,var(--nav-ink) 78%,transparent)}
.led{width:8px; height:8px; border-radius:50%; background:var(--ok); box-shadow:0 0 0 3px rgba(255,255,255,.35)}
.led.disconnected{background:var(--err)}
.modelchip{font-family:var(--mono); font-size:11.5px; color:var(--nav-ink); border:1px solid var(--nav-border);
  padding:3px 8px; border-radius:999px; white-space:nowrap}
.modelchip b{color:var(--nav-ink); font-weight:700}
.iconbtn{width:32px; height:32px; display:grid; place-items:center; border:1px solid var(--nav-border);
  background:var(--panel); border-radius:8px; color:var(--ink-2)}
.iconbtn:hover{border-color:var(--nav-ink); color:var(--ink)}
.btn-primary{font-family:var(--mono); font-size:12px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
  color:var(--btn-fg); background:var(--btn-bg); border:1px solid var(--btn-bg); padding:8px 14px; border-radius:8px;
  box-shadow:0 1px 2px rgba(0,0,0,.16)}
.btn-primary:hover{background:var(--btn-bg-hover); border-color:var(--btn-bg-hover); color:var(--btn-fg)}

/* keyboard focus floor */
:focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:6px}
.tab:focus-visible,.row:focus-visible{outline-offset:-2px}

/* ---------- shell / views ---------- */
main{flex:1; width:100%; animation:rise .4s ease both}
@keyframes rise{from{opacity:0; transform:translateY(6px)}}
.view{display:none}
.view.active{display:block}
.wrap{max-width:860px; margin:0 auto; padding:26px 20px 40px}
.wrap-wide{max-width:960px}

.page-head{display:flex; align-items:flex-end; gap:14px; margin:8px 0 20px}
.page-title{font-family:var(--mono); font-size:22px; font-weight:600; letter-spacing:.18em; text-transform:uppercase; margin:0}
.page-count{font-family:var(--mono); font-size:12px; color:var(--muted); padding-bottom:3px}
.page-head .spacer{flex:1}
.search{font-family:var(--mono); font-size:13px; color:var(--ink); background:var(--panel);
  border:1px solid var(--line); border-radius:8px; padding:8px 12px; width:200px}
.search:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-wash)}
.eyebrow{font-family:var(--mono); font-size:11px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:var(--muted)}

/* ---------- sessions list (mock 159-176) ---------- */
.list{border:1px solid var(--line); border-radius:12px; background:var(--panel); overflow:hidden; box-shadow:var(--shadow)}
.row{display:grid; grid-template-columns:14px 1fr auto; gap:14px; align-items:center;
  padding:14px 16px; border-bottom:1px solid var(--line-2); position:relative; cursor:pointer; text-align:left; width:100%;
  background:none; border-left:0; border-right:0; border-top:0}
.row:last-child{border-bottom:0}
.row::before{content:""; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--accent); transform:scaleY(0); transition:transform .16s}
.row:hover{background:var(--panel-2)} .row:hover::before{transform:scaleY(1)}
.dot{width:9px; height:9px; border-radius:50%; background:var(--ink-2)}
.dot.agent{border-radius:2px; background:var(--warn)}
.r-main{min-width:0}
.r-name{font-family:var(--mono); font-size:13.5px; font-weight:600; color:var(--ink); display:flex; align-items:center; gap:8px}
.r-tag{font-family:var(--mono); font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--warn);
  border:1px solid color-mix(in srgb,var(--warn) 45%,transparent); border-radius:999px; padding:1px 6px}
.r-prev{color:var(--muted); font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:2px}
.r-meta{display:flex; align-items:center; gap:14px; font-family:var(--mono); font-size:11.5px; color:var(--muted); white-space:nowrap}
.r-meta .m-model{color:var(--cool)}
.r-meta .m-turns b{color:var(--ink-2)}
.row-del{color:var(--muted); padding:0 2px}
.row-del:hover{color:var(--err)}
.session-section{font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); padding:12px 16px 4px}
.run-status{font-family:var(--mono); margin-right:6px}
.run-status.success{color:var(--ok)} .run-status.failed{color:var(--err)} .run-status.running{color:var(--accent-ink)} .run-status.interrupted{color:var(--warn)}
.no-sessions{padding:18px 16px; color:var(--muted); font-family:var(--mono); font-size:13px}

@media (max-width:760px){
  /* top bar: row 1 = brand … theme + new; row 2 = its OWN solid gold nav strip */
  .topbar{flex-wrap:wrap; height:auto; min-height:52px; padding:8px 14px 0;
    column-gap:12px; row-gap:0; align-items:center; border-bottom:none}
  .brand{letter-spacing:.24em; font-size:13px}
  .status,.modelchip{display:none}
  /* row 2 sits FLUSH against row 1 — no row-gap, no margin — so gold meets gold */
  nav.tabs{order:10; flex:1 1 100%; margin:0 -14px; padding:0 6px;
    background:var(--nav);                       /* own gold bg — never transparent */
    border-top:1px solid var(--nav-border);
    border-bottom:1px solid var(--nav-border);
    justify-content:space-around; gap:0}
  .tab{flex:1; text-align:center; padding:11px 4px 12px}
  .tab .u{left:16%; right:16%}
  .wrap{padding:20px 14px 40px}
  /* page header stacks: title, count, then the action on its own line */
  .page-head{flex-direction:column; align-items:flex-start; gap:8px}
  .page-title{font-size:19px}
  .page-head .spacer{display:none}
  .search{width:100%; align-self:stretch}
  /* session rows: meta drops to its own line, no overlap */
  .row{grid-template-columns:12px 1fr; row-gap:6px; padding:13px 14px}
  .r-name{flex-wrap:wrap}
  .r-meta{grid-column:1 / -1; padding-left:26px; justify-content:flex-start; gap:14px}
  .r-meta .m-model{display:none}
  .a-foot{gap:8px 14px}
  .strip .lbl{font-size:8px}
}
@media (max-width:400px){
  .brand{font-size:12px; letter-spacing:.16em}
  .tab{font-size:11px; letter-spacing:.03em; padding:10px 2px 12px}
  .btn-primary{padding:8px 11px}
  .r-meta{gap:10px; font-size:11px}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}
/* ===== end UI v2 shell ===== */

/* ---------- chat (UI v2 Task 2) ---------- */
.thread{display:flex; flex-direction:column; gap:22px}
.msg .role{font-family:var(--mono); font-size:11px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; margin-bottom:6px}
.msg.you .role{color:var(--ink-2)}
.msg.eunice .role{color:var(--accent-ink)}
.msg .body{color:var(--ink-2)}
.msg.you .body{color:var(--ink)}
.tool{margin:12px 0; border:1px solid var(--line); border-radius:10px; background:var(--panel); overflow:hidden}
.tool-head{display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--line-2);
  font-family:var(--mono); font-size:12px}
.tool-head .cmd{color:var(--cool); font-weight:600}
.tool-head .arg{color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.tool-head .done{margin-left:auto; font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--ok);
  border:1px solid color-mix(in srgb,var(--ok) 40%,transparent); border-radius:999px; padding:1px 7px}
.tool-body{font-family:var(--mono); font-size:12px; color:var(--ink-2); background:var(--panel-2);
  padding:10px 12px; white-space:pre; overflow-x:auto; line-height:1.5}
.thinking{display:flex; align-items:center; gap:8px; color:var(--accent-ink); font-family:var(--mono); font-size:12px}
.thinking i{width:6px; height:6px; border-radius:50%; background:var(--accent); animation:pulse 1s ease-in-out infinite}
.thinking i:nth-child(2){animation-delay:.15s} .thinking i:nth-child(3){animation-delay:.3s}
@keyframes pulse{0%,100%{opacity:.25; transform:scale(.8)}50%{opacity:1; transform:scale(1)}}
.composer{position:sticky; bottom:0; background:linear-gradient(transparent,var(--paper) 22%);
  padding:14px 0 4px; margin-top:8px}
.composer-inner{display:flex; gap:10px; align-items:flex-end; border:1px solid var(--line); background:var(--panel);
  border-radius:12px; padding:10px; box-shadow:var(--shadow)}
.composer-inner:focus-within{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-wash)}
.composer textarea{flex:1; border:0; resize:none; background:none; color:var(--ink); font-family:var(--mono);
  font-size:14px; line-height:1.5; min-height:24px; outline:none}
.composer .hint{font-family:var(--mono); font-size:10.5px; color:var(--muted); padding:6px 2px 0}

.messages{display:flex; flex-direction:column; gap:22px}
.msg.error .body{color:var(--err)}
.msg.system .body{color:var(--muted); font-family:var(--mono); font-size:12.5px}
.tool.tool-result .tool-body{max-height:320px; overflow:auto}
.truncated-notice{font-family:var(--mono); font-size:11px; color:var(--warn); padding:6px 12px}
.cursor{color:var(--accent); font-weight:700}
.query-input{flex:1; border:0; resize:none; background:none; color:var(--ink); font-family:var(--mono); font-size:14px; line-height:1.5; min-height:24px; outline:none}
.btn-cancel{display:none; font-family:var(--mono); font-size:12px; font-weight:600; color:var(--err); background:none; border:1px solid color-mix(in srgb,var(--err) 45%,transparent); border-radius:8px; padding:8px 12px}
.btn-cancel.visible{display:inline-block}
/* rendered markdown inside a response body */
.msg .body p{margin:0 0 10px} .msg .body p:last-child{margin:0}
.msg .body pre{background:var(--panel-2); border:1px solid var(--line); border-radius:8px; padding:10px 12px; overflow:auto; font-family:var(--mono); font-size:12.5px}
.msg .body code{font-family:var(--mono); font-size:.92em}
.msg .body a{color:var(--accent-ink); text-decoration:underline}
.status-bar{padding:6px 20px; border-top:1px solid var(--line); color:var(--muted); font-family:var(--mono); font-size:11px; text-align:right}
/* ===== end chat ===== */
        :root {
            --bg: #fafafa;
            --bg-card: #ffffff;
            --bg-input: #f5f5f5;
            --text: #1a1a1a;
            --text-muted: #888888;
            --border: #e0e0e0;
            --border-strong: #1a1a1a;
            --neon-cyan: #00e5ff;
            --neon-magenta: #ff00ff;
            --neon-coral: #ff6b6b;
            --neon-mint: #00ffaa;
            --neon-yellow: #ffee00;
            --grid-line: rgba(0,0,0,0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 0 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* NOTE: the old header/.header-*/.logo rules that lived here (and their
           responsive counterparts below) were deleted in UI v2 Task 2 — the <header>
           element is now `.topbar` (shell CSS above); this legacy `header{flex-direction:
           column}` element-selector rule had no competing declaration in `.topbar` and
           was silently applying to it. `.status` is kept: it's still used by the new
           topbar and already re-declared in the "Shell theme, declared last" block below
           to win the cascade against this one. */
        .status {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 12px;
        }

        /* The session drawer, its tabs, and the old .session-item/.session-list rows
           were removed in Task 3 — the Sessions view now uses .list/.row (see the
           "sessions list" block in the shell CSS above). .btn-new-session survives:
           the agent index page's "+ NEW AGENT" button still uses it. */
        .btn-new-session {
            padding: 4px 10px;
            font-size: 11px;
            background: var(--neon-mint);
            color: var(--bg);
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            white-space: nowrap;
        }

        .btn-new-session:hover {
            opacity: 0.8;
        }

        /* The old drawer's AGENTS tab (.agent-list, .agent-card*, .agent-dot*,
           .agent-detail*, .agent-prompt, .agent-session*, .btn-agent, .agent-cron,
           and their old-theme .agents-note/.agents-warning) styled a 300px stacked
           list that no longer exists — Task 1 removed the drawer and Task 4 replaced
           the full-page index's rows with the gilt .card/.strip below. Nothing in
           this file emits those classes any more. */

        /* Agent editor page

           A sibling of .container that replaces it rather than an overlay on top of it,
           so the editor has a URL of its own and the PROMPT box can take the height the
           400px-capped modal never had. Nothing here scrolls internally; the page grows
           and the body scrolls, which keeps the flex-grown textarea predictable. */
        .agent-page {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 0 20px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .agent-page-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 24px 0 16px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-strong);
        }

        .agent-page-back {
            font-family: inherit;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            background: none;
            border: none;
            padding: 0;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
        }

        .agent-page-back:hover {
            color: var(--text);
        }

        .agent-page-title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.1em;
            word-break: break-all;
        }

        .agent-page-form {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        /* The whole point of the page: PROMPT takes every pixel the other fields leave,
           and never less than 40vh — below that the page just scrolls. */
        .form-field-prompt {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .form-field-prompt .form-textarea {
            flex: 1;
            min-height: 40vh;
            resize: none;
        }

        /* Agent index page

           The full-screen counterpart to the drawer's AGENTS tab, routed at '#/agent/'.
           A third body-level sibling of .container and .agent-page; exactly one of the
           three is ever visible. Wider than the editor because a row is a set of
           columns rather than a form, and the drawer's 300px never had room for the
           plain-English schedule this page leads with. */
        .agent-index {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            padding: 0 20px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .agent-index-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 24px 0 16px;
            margin-bottom: 4px;
            border-bottom: 1px solid var(--border-strong);
        }

        /* Absorbs the slack so '+ NEW AGENT' sits at the far edge without the title
           having to stretch to reach it. */
        .agent-index-header-spacer {
            flex: 1;
        }

        /* .agent-index-row/-name/-schedule/-desc/-model/-runs styled the old table-row
           layout. Task 4 replaced renderAgentIndexRow's markup with the .card/.strip
           below, so those rows no longer exist; only .agent-index-empty still paints
           (the empty-state and loading placeholder). */
        .agent-index-empty {
            padding: 32px 10px;
            color: var(--text-muted);
            font-size: 12px;
        }

        .agent-index-note {
            padding: 16px 10px 0;
            color: var(--text-muted);
            font-size: 11px;
            word-break: break-word;
        }

        /* Declared after every rule it overrides so equal specificity still wins. */
        .hidden {
            display: none;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            /* The session drawer is at z-index 1001 and can still be open behind a
               modal, so this overlay has to outrank it. */
            z-index: 1100;
        }

        .modal-overlay.visible {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border-strong);
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.1em;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
            font-family: inherit;
        }

        .modal-close:hover {
            color: var(--text);
        }

        /* The confirm dialog is a couple of lines of prose, so 700px reads as a lot of
           empty card; it gets its own narrower width. */
        .modal-confirm {
            max-width: 420px;
        }

        .confirm-message {
            font-size: 12px;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 20px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .api-endpoint {
            margin-bottom: 24px;
        }

        .api-endpoint h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .api-method {
            padding: 2px 6px;
            font-size: 11px;
            font-weight: 600;
        }

        .api-method.get {
            background: var(--neon-mint);
            color: var(--text);
        }

        .api-method.post {
            background: var(--neon-cyan);
            color: var(--text);
        }

        .api-endpoint p {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 12px;
        }

        .api-curl {
            background: var(--bg-input);
            border: 1px solid var(--border);
            padding: 12px;
            font-size: 12px;
            overflow-x: auto;
            white-space: pre;
        }

        .api-response {
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .api-response summary {
            cursor: pointer;
            margin-bottom: 8px;
        }

        .api-response pre {
            background: var(--bg-input);
            border: 1px solid var(--border);
            padding: 12px;
            overflow-x: auto;
        }

        /* Agent editor form */
        .form-field {
            margin-bottom: 14px;
        }

        .form-label {
            display: block;
            font-size: 9px;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            font-family: inherit;
            font-size: 13px;
            padding: 8px 10px;
            border: 1px solid var(--border-strong);
            background: var(--bg-input);
            color: var(--text);
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--neon-cyan);
        }

        .form-input[readonly] {
            border-color: var(--border);
            color: var(--text-muted);
        }

        .form-textarea {
            min-height: 220px;
            resize: vertical;
            line-height: 1.5;
        }

        .form-hint {
            font-size: 10px;
            line-height: 1.5;
            color: var(--text-muted);
            margin-top: 4px;
            word-break: break-word;
        }

        /* Live cron feedback under the SCHEDULE field. */
        .cron-preview {
            font-size: 10px;
            line-height: 1.6;
            margin-top: 6px;
        }

        .cron-line {
            display: flex;
            gap: 6px;
            word-break: break-word;
        }

        .cron-mark {
            flex-shrink: 0;
            width: 8px;
        }

        .cron-good {
            color: var(--text);
        }

        .cron-good .cron-mark {
            color: var(--neon-magenta);
        }

        .cron-bad {
            color: var(--neon-coral);
        }

        .cron-warn .cron-mark {
            color: var(--neon-coral);
        }

        /* Continuation lines hang under the text of the line above, not its glyph. */
        .cron-detail {
            color: var(--text-muted);
            padding-left: 14px;
        }

        .form-row {
            display: flex;
            gap: 12px;
        }

        .form-row .form-field {
            flex: 1;
            min-width: 0;
        }

        .form-check {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .form-error {
            border-left: 3px solid var(--neon-coral);
            background: var(--bg-input);
            color: var(--neon-coral);
            font-size: 11px;
            line-height: 1.5;
            padding: 8px 10px;
            margin-bottom: 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .form-error.notice {
            border-left-color: var(--neon-yellow);
            color: var(--text);
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            border-top: 1px solid var(--border);
            padding-top: 14px;
        }

        .modal-actions-spacer {
            flex: 1;
        }

        .btn-form {
            padding: 8px 14px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid var(--border-strong);
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
        }

        .btn-form:hover {
            background: var(--text);
            color: var(--bg);
        }

        .btn-form:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-form-primary {
            background: var(--text);
            color: var(--bg);
        }

        .btn-form-primary:hover {
            background: #333;
            color: var(--bg);
        }

        .btn-form-danger {
            border-color: var(--neon-coral);
            color: var(--neon-coral);
        }

        .btn-form-danger:hover,
        .btn-form-danger.armed {
            background: var(--neon-coral);
            color: var(--bg);
        }

        /* Toast — a confirmation for an action whose own page is gone by the time it
           succeeds, so there is nowhere on screen left to report it. */
        .toast {
            position: fixed;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%);
            /* Bounded against the viewport rather than a fixed width, so a long agent
               name wraps on a phone instead of running off the side. */
            max-width: min(420px, calc(100vw - 32px));
            padding: 10px 16px;
            background: var(--text);
            color: var(--bg);
            border: 1px solid var(--border-strong);
            font-size: 12px;
            font-weight: 600;
            line-height: 1.4;
            text-align: center;
            word-break: break-word;
            /* Above the drawer (1001) and the modal overlay (1100): a confirmation that
               lands behind something has not confirmed anything. */
            z-index: 1200;
            /* Fixed and inert: the toast must neither move the page it is confirming nor
               swallow a click aimed at what is underneath it. */
            pointer-events: none;
            /* Faded rather than display:none so the element stays in the accessibility
               tree the whole time — a live region that appears and fills in at once is
               unreliably announced. showToast() empties the text on the way out instead. */
            opacity: 0;
            transition: opacity 0.25s ease-out;
        }

        .toast.visible {
            opacity: 1;
        }

        /* The fade is decoration; the message is not. With motion reduced the toast
           appears and leaves instantly, and still dismisses itself on the same timer. */
        @media (prefers-reduced-motion: reduce) {
            .toast {
                transition: none;
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            html, body {
                overflow-x: hidden;
                max-width: 100vw;
            }

            .container {
                padding: 0 12px;
                max-width: 100%;
                overflow-x: hidden;
            }

            /* .session-section survives mobile: still a real class on the Sessions
               view's group headers (see .list/.row in the shell CSS above). The
               drawer/.session-item rules that used to sit here are gone with Task 3. */
            .session-section {
                padding: 10px 12px 4px;
            }

            /* .query-input kept: real class on the composer's textarea (Task 2), and
               this iOS-zoom-on-focus fix is still worth having. */
            .query-input {
                font-size: 16px; /* Prevents iOS zoom on focus */
                padding: 10px 12px;
            }

            .modal {
                width: 94%;
                max-height: 90vh;
                padding: 14px;
            }

            .modal-content {
                padding: 16px;
                max-height: 85vh;
            }

            .agent-page {
                padding: 0 12px 12px;
                max-width: 100%;
                overflow-x: hidden;
            }

            .agent-page-header {
                padding: 16px 0 12px;
                margin-bottom: 14px;
                gap: 10px;
            }

            .agent-page-title {
                font-size: 14px;
            }

            .agent-index {
                padding: 0 12px 12px;
                max-width: 100%;
                overflow-x: hidden;
            }

            .agent-index-header {
                padding: 16px 0 12px;
                gap: 10px;
                /* Three items do not fit on a phone; the button drops to its own line
                   rather than pushing the title into a horizontal scroll. */
                flex-wrap: wrap;
            }

            .form-input,
            .form-textarea {
                font-size: 16px; /* Prevents iOS zoom on focus */
            }

            .form-textarea {
                min-height: 150px;
            }

            /* 40vh of a phone screen is most of it once the on-screen keyboard is up. */
            .form-field-prompt .form-textarea {
                min-height: 30vh;
            }

            .form-row {
                display: block;
            }

            .modal-actions {
                flex-wrap: wrap;
            }

            .modal-actions-spacer {
                display: none;
            }

            .btn-form {
                flex: 1;
                padding: 10px 8px;
            }

            .modal-title {
                font-size: 14px;
            }

            .api-endpoint h3 {
                font-size: 12px;
            }

            .api-endpoint p {
                font-size: 11px;
            }

            .api-example {
                font-size: 10px;
                padding: 8px;
            }
        }

        /* Tabbed content view for HTML/Markdown */
        .tabbed-content {
            border: 1px solid var(--line);
            border-radius: 4px;
            overflow: hidden;
        }
        .tabbed-content .tab-header {
            display: flex;
            background: var(--panel-2);
            border-bottom: 1px solid var(--line);
        }
        .tabbed-content .tab-btn {
            background: none;
            border: none;
            padding: 8px 16px;
            color: var(--muted);
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .tabbed-content .tab-btn:hover {
            color: var(--ink);
        }
        .tabbed-content .tab-btn.active {
            color: var(--accent-ink);
            background: var(--panel);
            border-bottom: 2px solid var(--accent);
            margin-bottom: -1px;
        }
        .tabbed-content .tab-body {
            padding: 12px;
        }
        .tabbed-content .tab-panel {
            display: none;
        }
        .tabbed-content .tab-panel.active {
            display: block;
        }
        .tabbed-content .tab-panel.code-panel {
            background: var(--panel-2);
            white-space: pre-wrap;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 12px;
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
        }

        /* Shell theme, declared last so legacy equal-specificity rules don't win (see .hidden above). */
        body{
          background:var(--paper);
          background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
          background-size:23px 23px;
          color:var(--ink); font-family:var(--sans); font-size:15px; line-height:1.55;
          display:flex; flex-direction:column; min-height:100%;
          overflow-x:hidden;
        }
        .status{display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:12px;
          color:color-mix(in srgb,var(--nav-ink) 78%,transparent)}
        .btn-primary{font-family:var(--mono); font-size:12px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
          color:var(--btn-fg); background:var(--btn-bg); border:1px solid var(--btn-bg); padding:8px 14px; border-radius:8px;
          box-shadow:0 1px 2px rgba(0,0,0,.16)}
        .btn-primary:hover{background:var(--btn-bg-hover); border-color:var(--btn-bg-hover); color:var(--btn-fg)}
        .btn-primary:disabled{opacity:.55; cursor:not-allowed}

        /* ---------- agents (UI v2 Task 4, mock 178-204) — declared last so it wins
           over the old .agent-index-header/.agent-page-title/.agent-index-note rules
           above (same selectors, equal specificity: see the "declared last" note). */
        .agents{display:grid; gap:16px}
        .card{border:1px solid var(--line); border-radius:12px; background:var(--panel); padding:16px 18px; box-shadow:var(--shadow); cursor:pointer}
        .card:hover{border-color:color-mix(in srgb,var(--accent) 45%,var(--line))}
        .card-top{display:flex; align-items:center; gap:10px}
        .a-name{font-family:var(--mono); font-size:15px; font-weight:600; color:var(--ink)}
        .chip{font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; border-radius:999px; padding:2px 8px; border:1px solid}
        .chip.on{color:var(--ok); border-color:color-mix(in srgb,var(--ok) 45%,transparent); background:color-mix(in srgb,var(--ok) 10%,transparent)}
        .chip.off{color:var(--muted); border-color:var(--line)}
        .chip.err{color:var(--err); border-color:color-mix(in srgb,var(--err) 45%,transparent)}
        .a-desc{color:var(--muted); font-size:13.5px; margin:8px 0 14px; max-width:62ch}
        .a-foot{display:flex; align-items:center; gap:18px; flex-wrap:wrap; font-family:var(--mono); font-size:11.5px; color:var(--muted)}
        .a-foot .cron{color:var(--ink-2)} .a-foot .next b{color:var(--accent-ink)}
        .a-foot .last.ok{color:var(--ok)} .a-foot .last.err{color:var(--err)}
        .a-foot .a-model{color:var(--cool)}

        /* signature: 24h cron tick-strip */
        .strip{position:relative; height:34px; margin:12px 0 4px; border:1px solid var(--line); border-radius:8px;
          background:repeating-linear-gradient(90deg,transparent,transparent calc(100%/24 - 1px),var(--line-2) calc(100%/24 - 1px),var(--line-2) calc(100%/24));
          overflow:hidden}
        .strip .q{position:absolute; top:0; bottom:0; width:1px; background:var(--line)}
        .strip .lbl{position:absolute; bottom:3px; font-family:var(--mono); font-size:9px; color:var(--muted); transform:translateX(-50%)}
        .strip .mark{position:absolute; top:0; bottom:0; width:2px; background:var(--accent);
          box-shadow:0 0 0 3px var(--accent-wash)}
        .strip .mark::before{content:""; position:absolute; top:4px; left:50%; width:7px; height:7px; border-radius:50%;
          background:var(--gilt); box-shadow:0 0 0 2px var(--accent-wash); transform:translateX(-50%)}
        .strip .mark .t{position:absolute; top:-1px; left:6px; font-family:var(--mono); font-size:9.5px; color:var(--accent-ink); white-space:nowrap}
        .strip .now{position:absolute; top:0; bottom:0; width:1px; background:var(--ink-2); opacity:.5}

        .card.disabled{opacity:.72}
        .agent-index-header{display:flex; align-items:center; gap:14px; max-width:960px; margin:0 auto; padding:26px 20px 6px}
        .agent-page-title{font-family:var(--mono); font-size:22px; letter-spacing:.18em; text-transform:uppercase}
        .agent-index-note,.agent-index-header-spacer{flex:1}
        .agent-index-note{max-width:960px; margin:8px auto; padding:0 20px; color:var(--muted); font-family:var(--mono); font-size:12px}
        .agents-warning{color:var(--warn); white-space:pre-wrap; margin-top:6px}
        #agent-index-list{max-width:960px; margin:0 auto; padding:8px 20px 40px; display:grid; gap:16px}
        /* ===== end agents (Task 4) ===== */
    </style>
    <!-- Markdown-it library for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
</head>
<body>
    <!-- Top cockpit bar -->
    <header class="topbar">
      <a class="brand" href="#/" aria-label="eunice home">EUNICE<span class="caret" aria-hidden="true"></span></a>
      <nav class="tabs" aria-label="Primary">
        <button class="tab" data-route="chat">Chat<span class="u"></span></button>
        <button class="tab" data-route="sessions">Sessions<span class="u"></span></button>
        <button class="tab" data-route="agents" id="tab-agents-btn">Agents<span class="u"></span></button>
      </nav>
      <div class="spacer"></div>
      <div class="status"><span class="led" id="status-dot" title="connection"></span><span id="status-text">connecting</span></div>
      <div class="modelchip" id="model-badge">loading…</div>
      <button class="iconbtn" id="themebtn" title="Toggle theme" aria-label="Toggle theme">◐</button>
      <button class="btn-primary" id="newbtn">+ New</button>
    </header>

    <main>
      <section class="view" id="view-chat">
        <div class="wrap">
          <div class="messages" id="messages"></div>
          <div class="composer">
            <div class="composer-inner">
              <textarea class="query-input" id="query-input" rows="1" placeholder="Message eunice…"></textarea>
              <button class="btn btn-cancel" id="cancel-btn">CANCEL</button>
              <button class="btn-primary" id="send-btn">Send</button>
            </div>
            <div class="hint" id="composer-hint"></div>
          </div>
        </div>
      </section>

      <section class="view" id="view-sessions">
        <div class="wrap">
          <div class="page-head">
            <h1 class="page-title">Sessions</h1>
            <span class="page-count" id="session-count"></span>
            <div class="spacer"></div>
            <input class="search" id="session-filter" placeholder="Filter sessions" aria-label="Filter sessions">
          </div>
          <div class="list" id="session-list"></div>
        </div>
      </section>
    </main>

    <!-- Agent index page — routed at #/agent/ -->
    <div class="agent-index hidden" id="agent-index-page">
        <div class="agent-index-header">
            <button class="agent-page-back" id="agent-index-back">&larr; CHAT</button>
            <div class="agent-page-title">AGENTS</div>
            <div class="agent-index-header-spacer"></div>
            <button class="btn-new-session hidden" id="agent-index-new-btn">+ NEW AGENT</button>
        </div>
        <div id="agent-index-list"></div>
        <div class="agent-index-note hidden" id="agent-index-note"></div>
    </div>

    <!-- Agent editor page — routed at #/agent/<name> and #/agent/new -->
    <div class="agent-page hidden" id="agent-page">
        <div class="agent-page-header">
            <button class="agent-page-back" id="agent-page-back">&larr; AGENTS</button>
            <div class="agent-page-title" id="agent-page-title">EDIT AGENT</div>
        </div>
        <div class="agent-page-form" id="agent-page-form">
            <div class="form-field">
                <label class="form-label" for="agent-form-name">NAME</label>
                <input class="form-input" id="agent-form-name" type="text" autocomplete="off" autocapitalize="none" spellcheck="false">
                <div class="form-hint" id="agent-form-name-hint"></div>
            </div>
            <div class="form-field">
                <label class="form-label" for="agent-form-schedule">SCHEDULE</label>
                <input class="form-input" id="agent-form-schedule" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="0 9 * * *">
                <div class="cron-preview hidden" id="agent-form-schedule-preview" role="status" aria-live="polite"></div>
                <div class="form-hint">5-field cron in the server's local time: minute hour day-of-month month day-of-week. 0 9 * * * runs at 09:00 daily.</div>
            </div>
            <div class="form-field form-field-prompt">
                <label class="form-label" for="agent-form-prompt" id="agent-form-prompt-label">PROMPT</label>
                <textarea class="form-textarea" id="agent-form-prompt" spellcheck="false"></textarea>
                <div class="form-hint" id="agent-form-prompt-hint"></div>
            </div>
            <div class="form-field">
                <label class="form-label" for="agent-form-model">MODEL</label>
                <input class="form-input" id="agent-form-model" type="text" autocomplete="off" autocapitalize="none" spellcheck="false">
                <div class="form-hint" id="agent-form-model-hint"></div>
            </div>
            <div class="form-row">
                <div class="form-field">
                    <label class="form-label" for="agent-form-timeout">TIMEOUT (SECONDS)</label>
                    <input class="form-input" id="agent-form-timeout" type="number" min="1" step="1">
                    <div class="form-hint">A run that exceeds this is aborted and recorded as failed.</div>
                </div>
                <div class="form-field">
                    <label class="form-label" for="agent-form-working-dir">WORKING DIR</label>
                    <input class="form-input" id="agent-form-working-dir" type="text" autocomplete="off" autocapitalize="none" spellcheck="false">
                    <div class="form-hint">Blank uses the server's working directory.</div>
                </div>
            </div>
            <div class="form-field">
                <label class="form-check" for="agent-form-enabled">
                    <input type="checkbox" id="agent-form-enabled">
                    <span>ENABLED — a disabled agent stays listed but is never scheduled.</span>
                </label>
            </div>
            <div class="form-error hidden" id="agent-form-error"></div>
            <div class="modal-actions">
                <button class="btn-form btn-form-danger hidden" id="agent-form-delete">DELETE</button>
                <div class="modal-actions-spacer"></div>
                <button class="btn-form hidden" id="agent-form-reload">RELOAD</button>
                <button class="btn-form" id="agent-form-cancel">CANCEL</button>
                <button class="btn-form btn-form-primary" id="agent-form-save">SAVE</button>
            </div>
        </div>
        <div class="hidden" id="agent-page-missing">
            <div class="form-error" id="agent-page-missing-text"></div>
            <div class="modal-actions">
                <div class="modal-actions-spacer"></div>
                <button class="btn-form btn-form-primary" id="agent-page-missing-back">BACK TO AGENTS</button>
            </div>
        </div>
    </div>

    <!-- Generic confirm dialog — reuses the modal CSS the editor left behind when it
         became a page. Driven only through confirmDialog(). -->
    <div class="modal-overlay" id="confirm-dialog">
        <div class="modal modal-confirm" role="dialog" aria-modal="true" aria-labelledby="confirm-dialog-title">
            <div class="modal-header">
                <div class="modal-title" id="confirm-dialog-title">CONFIRM</div>
            </div>
            <div class="confirm-message" id="confirm-dialog-message"></div>
            <div class="modal-actions">
                <div class="modal-actions-spacer"></div>
                <button class="btn-form" id="confirm-dialog-cancel">CANCEL</button>
                <button class="btn-form btn-form-danger" id="confirm-dialog-confirm">OK</button>
            </div>
        </div>
    </div>

    <!-- Transient confirmation. Mounted for the life of the page rather than created on
         demand, so the live region is already registered when a message arrives. -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <div class="status-bar" id="status-bar"><span id="version-display">-</span></div>

    <script>
        const messagesEl = document.getElementById('messages');
        const queryInput = document.getElementById('query-input');
        const sendBtn = document.getElementById('send-btn');
        const cancelBtn = document.getElementById('cancel-btn');
        const modelBadge = document.getElementById('model-badge');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        let isRunning = false;
        let thinkingEl = null;
        let eventSource = null;
        let currentAgent = null;  // Current agent name for multi-agent mode

        // Session management - stored in localStorage for persistence across tab closes
        // When authenticated via proxy, server handles sessions per-user automatically
        const SESSION_KEY = 'eunice_session_id';
        const SESSION_NAME_KEY = 'eunice_session_name';
        let sessionId = localStorage.getItem(SESSION_KEY);
        let authenticatedUser = null;  // Set if user is authenticated via proxy

        // Check if session name is in URL hash (e.g., /#/sprawl-molly)
        function getSessionFromUrl() {
            const route = parseRoute();
            return route.view === 'chat' ? route.session : null;
        }

        // Update URL to reflect current session
        function updateSessionUrl(sessionName) {
            // The agent pages own the URL while one of them is routed to, and the chat
            // session behind them keeps resolving in the background — that must not
            // overwrite '#/agent/' or '#/agent/...'.
            if (parseRoute().view !== 'chat') return;

            if (sessionName) {
                window.history.replaceState(null, '', '#/' + sessionName);
            } else {
                window.history.replaceState(null, '', window.location.pathname);
            }
        }

        // Check if message content contains system instructions (DMN mode)
        function isSystemInstructionMessage(content) {
            if (!content) return false;
            // DMN instructions start with this marker
            return content.includes('# DMN: DEFAULT MODE NETWORK') ||
                   content.includes('You are now in DMN (Default Mode Network) autonomous batch mode');
        }

        // Extract user's actual prompt from a DMN-wrapped message
        function extractUserPrompt(content) {
            if (!content) return content;
            const marker = '# USER REQUEST\n\n';
            const endMarker = '\n\n---\n\nYou are now in DMN';
            const startIdx = content.indexOf(marker);
            const endIdx = content.indexOf(endMarker);
            if (startIdx !== -1 && endIdx !== -1) {
                return content.substring(startIdx + marker.length, endIdx);
            }
            return content;
        }

        // Auto-resize textarea
        queryInput.addEventListener('input', () => {
            queryInput.style.height = 'auto';
            queryInput.style.height = Math.min(queryInput.scrollHeight, 150) + 'px';
        });

        // Handle Enter key
        queryInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendQuery();
            }
        });

        sendBtn.addEventListener('click', sendQuery);
        cancelBtn.addEventListener('click', cancelQuery);

        // Fetch initial status
        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                const provider = (data.mode || data.provider || '').toString();
                modelBadge.innerHTML = `${escapeHtml(data.model || '')}${provider ? ` · <b>${escapeHtml(provider.toLowerCase())}</b>` : ''}`;
                document.getElementById('composer-hint').textContent = `${data.model || 'model'} · ⏎ send · ⇧⏎ newline`;
                statusDot.classList.remove('disconnected');
                statusText.textContent = 'connected';
                document.getElementById('version-display').textContent = `v${data.version}`;
                if (data.agent) currentAgent = data.agent;
                if (data.authenticated_user) {
                    authenticatedUser = data.authenticated_user;
                    statusText.textContent = authenticatedUser;
                    sessionId = null;
                }
            } catch (err) {
                statusDot.classList.add('disconnected');
                statusText.textContent = 'error';
            }
        }

        (function initTheme(){
            const saved = localStorage.getItem('eunice_theme');
            if (saved === 'dark' || saved === 'light') document.documentElement.setAttribute('data-theme', saved);
        })();
        document.getElementById('themebtn').addEventListener('click', () => {
            const cur = document.documentElement.getAttribute('data-theme');
            const sysDark = matchMedia('(prefers-color-scheme:dark)').matches;
            const next = cur === 'dark' ? 'light' : (cur === 'light' ? 'dark' : (sysDark ? 'light' : 'dark'));
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('eunice_theme', next);
        });

        function addMessage(type, content) {
            const el = document.createElement('div');
            if (type === 'user') {
                el.className = 'msg you';
                el.innerHTML = `<div class="role">You</div><div class="body">${content}</div>`;
            } else if (type === 'response') {
                el.className = 'msg eunice';
                el.innerHTML = `<div class="role">Eunice</div><div class="body">${content}</div>`;
            } else if (type === 'thinking') {
                el.className = 'msg eunice';
                el.innerHTML = `<div class="thinking" aria-label="thinking"><i></i><i></i><i></i> ${content}</div>`;
            } else if (type === 'tool-call' || type === 'tool-result' || type === 'agent-invoke' || type === 'agent-result') {
                el.className = 'msg eunice';
                el.innerHTML = content; // content is a full .tool card, built by handleEvent
            } else { // error | system
                el.className = `msg ${type}`;
                el.innerHTML = `<div class="body">${content}</div>`;
            }
            messagesEl.appendChild(el);
            // Use scrollIntoView for reliable autoscroll
            el.scrollIntoView({ behavior: 'instant', block: 'end' });
            return el;
        }

        function removeThinking() {
            if (thinkingEl) {
                thinkingEl.remove();
                thinkingEl = null;
            }
        }

        async function sendQuery() {
            const query = queryInput.value.trim();
            if (!query || isRunning) return;

            isRunning = true;
            sendBtn.disabled = true;
            cancelBtn.classList.add('visible');
            queryInput.value = '';
            queryInput.style.height = 'auto';

            // Add user message
            addMessage('user', escapeHtml(query));

            // Add thinking indicator
            thinkingEl = addMessage('thinking', 'thinking');

            let receivedAnyEvent = false;

            try {
                const res = await fetch('/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: query, session_id: sessionId })
                });

                // Check for HTTP errors
                if (!res.ok) {
                    removeThinking();
                    const errorText = await res.text();
                    addMessage('error', `HTTP ${res.status}: ${errorText || res.statusText}`);
                    isRunning = false;
                    sendBtn.disabled = false;
                    cancelBtn.classList.remove('visible');
                    return;
                }

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) {
                        // Process any remaining buffer content
                        if (buffer.trim()) {
                            processSSEData(buffer);
                        }
                        break;
                    }

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        processSSEData(line);
                    }
                }

                function processSSEData(line) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data === 'ping') return;

                        try {
                            const event = JSON.parse(data);
                            receivedAnyEvent = true;
                            handleEvent(event);
                        } catch (e) {
                            console.error('Parse error:', e, data);
                            // Show parse errors to user if they contain useful info
                            if (data && data.length > 0) {
                                removeThinking();
                                addMessage('error', `Parse error: ${data}`);
                            }
                        }
                    }
                }

                // If stream ended without any events, show error
                if (!receivedAnyEvent) {
                    removeThinking();
                    addMessage('error', 'Connection closed without response');
                }
            } catch (err) {
                removeThinking();
                addMessage('error', `Connection error: ${err.message}`);
            }

            isRunning = false;
            sendBtn.disabled = false;
            cancelBtn.classList.remove('visible');
            removeThinking();
        }

        function handleEvent(event) {
            switch (event.type) {
                case 'thinking':
                    const timeEl = document.getElementById('thinking-time');
                    if (timeEl) {
                        timeEl.textContent = event.elapsed_seconds;
                    }
                    break;

                case 'tool_call':
                    removeThinking();
                    addMessage('tool-call', `<div class="tool"><div class="tool-head"><span class="cmd">⌘ ${escapeHtml(event.name)}</span><span class="arg">${escapeHtml(event.arguments)}</span></div></div>`);
                    thinkingEl = addMessage('thinking', 'running');
                    break;

                case 'tool_result':
                    removeThinking();
                    const lastTool = messagesEl.querySelector('.msg:last-child .tool, .tool:last-of-type');
                    const body = `<div class="tool-body">${escapeHtml(event.result)}</div>${event.truncated ? '<div class="truncated-notice">… output truncated</div>' : ''}`;
                    addMessage('tool-result', `<div class="tool tool-result"><div class="tool-head"><span class="done">done</span></div>${body}</div>`);
                    thinkingEl = addMessage('thinking', 'composing');
                    break;

                case 'agent_invoke':
                    removeThinking();
                    addMessage('agent-invoke', `<div class="tool"><div class="tool-head"><span class="cmd">🔀 invoking</span><span class="arg">${escapeHtml(event.agent_name)}</span></div><div class="tool-body">${escapeHtml(event.task)}</div></div>`);
                    thinkingEl = addMessage('thinking', 'agent running');
                    break;

                case 'agent_result':
                    removeThinking();
                    addMessage('agent-result', `<div class="tool tool-result"><div class="tool-head"><span class="cmd">✓ ${escapeHtml(event.agent_name)}</span><span class="done">returned</span></div><div class="tool-body">${escapeHtml(event.result)}</div>${event.truncated ? '<div class="truncated-notice">… output truncated</div>' : ''}</div>`);
                    thinkingEl = addMessage('thinking', 'composing');
                    break;

                case 'response':
                    removeThinking();
                    addMessage('response', renderContent(event.content));
                    break;

                case 'error':
                    removeThinking();
                    addMessage('error', escapeHtml(event.message));
                    break;

                case 'session_id':
                    // Store session ID from server (for new or existing sessions)
                    sessionId = event.session_id;
                    localStorage.setItem(SESSION_KEY, sessionId);
                    break;

                case 'compacted':
                    // Show compaction notice
                    addMessage('system', `Context compacted: ${escapeHtml(event.message)}`);
                    break;

                case 'done':
                    removeThinking();
                    break;
            }
        }

        async function cancelQuery() {
            try {
                await fetch('/api/cancel', { method: 'POST' });
            } catch (err) {
                console.error('Cancel error:', err);
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // escapeHtml() leaves quotes intact, so it cannot be used inside an attribute value.
        function escapeAttr(str) {
            return escapeHtml(str === null || str === undefined ? '' : String(str)).replace(/"/g, '&quot;');
        }

        // ---- Confirm dialog ----
        //
        // Stands in for window.confirm, of which there is none left in this file. The one
        // behavioral difference matters: this resolves a Promise on a later turn, so it
        // cannot block a hashchange the way window.confirm blocked synchronously. The
        // navigation guard below is built around that.

        const confirmOverlay = document.getElementById('confirm-dialog');
        const confirmTitleEl = document.getElementById('confirm-dialog-title');
        const confirmMessageEl = document.getElementById('confirm-dialog-message');
        const confirmOkBtn = document.getElementById('confirm-dialog-confirm');
        const confirmCancelBtn = document.getElementById('confirm-dialog-cancel');

        // Non-null only while the dialog is up, so it doubles as the open flag.
        let confirmResolve = null;
        let confirmReturnFocus = null;

        function confirmDialogIsOpen() {
            return confirmResolve !== null;
        }

        function settleConfirmDialog(result) {
            if (!confirmResolve) return;

            const resolve = confirmResolve;
            const returnFocus = confirmReturnFocus;
            confirmResolve = null;
            confirmReturnFocus = null;
            confirmOverlay.classList.remove('visible');

            // Focus goes back where it was, but the caller often tears that element down
            // right after — a re-rendered session row, a hidden editor — so it is only
            // restored while it is still in the document.
            if (returnFocus && returnFocus.isConnected && typeof returnFocus.focus === 'function') {
                returnFocus.focus();
            }
            resolve(result);
        }

        function confirmDialog({ title, message, confirmLabel }) {
            // A second dialog would strand the first one's promise unresolved, so the
            // outgoing one is cancelled. The navigation guard depends on this: a
            // hashchange arriving while CANCEL's dialog is up supersedes it.
            settleConfirmDialog(false);

            // textContent throughout, so interpolated names need no escaping.
            confirmTitleEl.textContent = title || 'CONFIRM';
            confirmMessageEl.textContent = message || '';
            confirmOkBtn.textContent = confirmLabel || 'OK';

            confirmReturnFocus = document.activeElement;
            confirmOverlay.classList.add('visible');
            confirmOkBtn.focus();

            return new Promise(resolve => { confirmResolve = resolve; });
        }

        confirmOkBtn.addEventListener('click', () => settleConfirmDialog(true));
        confirmCancelBtn.addEventListener('click', () => settleConfirmDialog(false));

        // Backdrop only — a click that starts inside the card and drifts out while
        // selecting text must not count, which is why this is mousedown on the overlay.
        confirmOverlay.addEventListener('mousedown', (e) => {
            if (e.target === confirmOverlay) settleConfirmDialog(false);
        });

        document.addEventListener('keydown', (e) => {
            if (!confirmDialogIsOpen()) return;

            if (e.key === 'Escape') {
                e.preventDefault();
                settleConfirmDialog(false);
            } else if (e.key === 'Tab') {
                // Two controls, so trapping focus is just toggling between them.
                e.preventDefault();
                (document.activeElement === confirmOkBtn ? confirmCancelBtn : confirmOkBtn).focus();
            }
        });

        // ---- Toast ----
        //
        // Says what just happened when the page that would have said it is already gone.
        // Kept generic — save and delete both use it — and deliberately not tied to the
        // agent editor.

        const toastEl = document.getElementById('toast');
        const TOAST_VISIBLE_MS = 3000;
        // Comfortably longer than the CSS fade, so the text never disappears mid-fade.
        const TOAST_FADE_MS = 400;
        let toastHideTimer = null;
        let toastClearTimer = null;

        function showToast(message) {
            // A second toast replaces the first rather than stacking under it. Both timers
            // have to go: an outgoing toast's clear-text timer would blank this message
            // mid-flight, and its hide timer would cut the display short.
            clearTimeout(toastHideTimer);
            clearTimeout(toastClearTimer);

            // textContent, so an agent name out of a config file needs no escaping.
            toastEl.textContent = message;
            toastEl.classList.add('visible');

            toastHideTimer = setTimeout(() => {
                toastEl.classList.remove('visible');
                // Emptied only once it is invisible: the region stays in the accessibility
                // tree permanently, and a stale message there would be read out of context.
                toastClearTimer = setTimeout(() => { toastEl.textContent = ''; }, TOAST_FADE_MS);
            }, TOAST_VISIBLE_MS);
        }

        // Initialize markdown-it
        const md = window.markdownit ? window.markdownit({
            html: true,
            linkify: true,
            typographer: true,
            breaks: true
        }) : null;

        // Detect content type: 'markdown', 'html', or 'plain'
        function detectContentType(text) {
            if (!text || typeof text !== 'string') return 'plain';

            // Check for HTML tags (but not markdown code blocks)
            const htmlTagPattern = /<(div|span|p|table|tr|td|th|ul|ol|li|h[1-6]|br|hr|img|a|strong|em|b|i)[^>]*>/i;
            const hasHtmlTags = htmlTagPattern.test(text);

            // Check for markdown patterns
            const markdownPatterns = [
                /^#{1,6}\s+.+$/m,           // Headers: # Header
                /\*\*[^*]+\*\*/,            // Bold: **text**
                /\*[^*]+\*/,                // Italic: *text*
                /`[^`]+`/,                  // Inline code: `code`
                /```[\s\S]*?```/,           // Code blocks: ```code```
                /^\s*[-*+]\s+.+$/m,         // Unordered lists: - item
                /^\s*\d+\.\s+.+$/m,         // Ordered lists: 1. item
                /\[.+\]\(.+\)/,             // Links: [text](url)
                /^\s*>\s+.+$/m,             // Blockquotes: > quote
                /^\s*\|.+\|.+\|/m,          // Tables: | col | col |
            ];

            const hasMarkdown = markdownPatterns.some(pattern => pattern.test(text));

            // If text has HTML tags and looks like intentional HTML, render as HTML
            if (hasHtmlTags && !hasMarkdown) {
                return 'html';
            }

            // If text has markdown patterns, render as markdown
            if (hasMarkdown) {
                return 'markdown';
            }

            return 'plain';
        }

        // Generate unique ID for tabbed content
        let tabbedContentId = 0;

        // Render content based on detected type with tabbed view for HTML/Markdown
        function renderContent(text) {
            const contentType = detectContentType(text);

            switch (contentType) {
                case 'markdown':
                    if (md) {
                        return createTabbedContent(text, md.render(text), 'Markdown');
                    }
                    // Fallback if markdown-it not loaded
                    return escapeHtml(text);

                case 'html':
                    // Create tabbed view for HTML content
                    return createTabbedContent(text, text, 'HTML');

                case 'plain':
                default:
                    return escapeHtml(text);
            }
        }

        // Create a tabbed content view with Preview and Code tabs
        function createTabbedContent(rawText, renderedContent, contentLabel) {
            const id = `tabbed-${++tabbedContentId}`;
            return `
                <div class="tabbed-content" id="${id}">
                    <div class="tab-header">
                        <button class="tab-btn active" data-tab="preview" onclick="switchTab('${id}', 'preview')">Preview</button>
                        <button class="tab-btn" data-tab="code" onclick="switchTab('${id}', 'code')">${contentLabel} Code</button>
                    </div>
                    <div class="tab-body">
                        <div class="tab-panel preview-panel active">${renderedContent}</div>
                        <div class="tab-panel code-panel">${escapeHtml(rawText)}</div>
                    </div>
                </div>
            `;
        }

        // Switch tabs in tabbed content
        function switchTab(containerId, tabName) {
            const container = document.getElementById(containerId);
            if (!container) return;

            // Update tab buttons
            container.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tabName);
            });

            // Update tab panels
            container.querySelectorAll('.tab-panel').forEach(panel => {
                if (tabName === 'preview') {
                    panel.classList.toggle('active', panel.classList.contains('preview-panel'));
                } else {
                    panel.classList.toggle('active', panel.classList.contains('code-panel'));
                }
            });
        }

        // NEW button reference (top cockpit bar)
        const newBtn = document.getElementById('newbtn');

        // Restore session history on page load
        async function restoreSessionHistory() {
            if (!sessionId) return;

            try {
                const res = await fetch('/api/session/history', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId })
                });

                const data = await res.json();

                if (!data.exists) {
                    // Session no longer exists on server, clear local storage
                    sessionId = null;
                    localStorage.removeItem(SESSION_KEY);
                    return;
                }

                // Render each message from history
                for (const msg of data.messages) {
                    switch (msg.role) {
                        case 'user':
                            // Filter out system instructions, extract actual user prompt
                            let userContent = msg.content;
                            if (isSystemInstructionMessage(userContent)) {
                                userContent = extractUserPrompt(userContent);
                            }
                            if (userContent && userContent.trim()) {
                                addMessage('user', escapeHtml(userContent));
                            }
                            break;

                        case 'assistant':
                            // Render tool calls if present
                            if (msg.tool_calls) {
                                for (const tc of msg.tool_calls) {
                                    addMessage('tool-call', `<div class="tool"><div class="tool-head"><span class="cmd">⌘ ${escapeHtml(tc.name)}</span><span class="arg">${escapeHtml(tc.arguments)}</span></div></div>`);
                                }
                            }
                            // Render content if present
                            if (msg.content) {
                                addMessage('response', renderContent(msg.content));
                            }
                            break;

                        case 'tool':
                            addMessage('tool-result', `<div class="tool tool-result"><div class="tool-head"><span class="done">done</span></div><div class="tool-body">${escapeHtml(msg.result)}</div></div>`);
                            break;
                    }
                }
            } catch (err) {
                console.error('Failed to restore session history:', err);
            }
        }

        // Reconnect to live events if there's an active query
        // This allows users to close the tab and reopen to see events that happened
        let reconnectController = null;
        let reconnectAttached = false;

        // Must run synchronously before a session switch: an aborted stream's
        // rejection lands a microtask later, too late to keep the send controls
        // it disabled from staying stuck on the next session.
        function stopReconnect() {
            if (reconnectController) {
                reconnectController.abort();
                reconnectController = null;
            }
            if (reconnectAttached) {
                reconnectAttached = false;
                isRunning = false;
                sendBtn.disabled = false;
                cancelBtn.classList.remove('visible');
            }
        }

        async function reconnectToEvents() {
            if (!sessionId) return;

            stopReconnect();
            const controller = new AbortController();
            const streamSessionId = sessionId;
            reconnectController = controller;

            console.log('[webapp] Reconnecting to session events:', sessionId.substring(0, 8));

            try {
                const response = await fetch('/api/session/events', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: streamSessionId }),
                    signal: controller.signal
                });

                if (!response.ok) {
                    console.error('[webapp] Failed to reconnect:', response.status);
                    return;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let hasReceivedEvents = false;

                // Add "Reconnecting..." indicator if we receive events
                let reconnectingMsg = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    // A read that resolved just before teardown must not paint
                    // the previous session's events into the new one.
                    if (reconnectController !== controller || sessionId !== streamSessionId) return;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            const jsonStr = line.substring(5).trim();
                            if (jsonStr === 'ping') continue;
                            if (!jsonStr) continue;

                            try {
                                const event = JSON.parse(jsonStr);

                                // Show reconnecting message on first event (if not Done)
                                if (!hasReceivedEvents && event.type !== 'done' && event.type !== 'session_id') {
                                    hasReceivedEvents = true;
                                    reconnectAttached = true;
                                    reconnectingMsg = addMessage('system', 'Reconnected - replaying events from background query...');
                                    isRunning = true;
                                    sendBtn.disabled = true;
                                    cancelBtn.classList.add('visible');
                                }

                                // Handle the event
                                handleEvent(event);

                                // If we got a done event, clean up
                                if (event.type === 'done') {
                                    reconnectAttached = false;
                                    isRunning = false;
                                    sendBtn.disabled = false;
                                    cancelBtn.classList.remove('visible');
                                    if (reconnectingMsg) {
                                        // Update the message to show completion
                                        reconnectingMsg.innerHTML = 'Background query completed - events restored';
                                    }
                                    return;
                                }
                            } catch (parseErr) {
