            overflow-y: auto;
        }
    </style>
    <!-- Markdown-it library for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
</head>
<body>
    <!-- Session Drawer -->
    <div class="session-drawer" id="session-drawer">
        <div class="drawer-header">
            <div class="drawer-tabs" id="drawer-tabs">
                <button class="drawer-tab active" id="tab-sessions">SESSIONS</button>
                <button class="drawer-tab hidden" id="tab-agents">AGENTS</button>
            </div>
            <button class="btn-new-session" id="drawer-new-btn">+ NEW</button>
            <button class="btn-new-session hidden" id="drawer-new-agent-btn">+ NEW AGENT</button>
        </div>
        <div class="session-list" id="session-list">
            <div class="no-sessions">No sessions yet</div>
        </div>
        <div class="agent-list hidden" id="agent-list"></div>
        <div class="drawer-footer" id="persistence-status">
            <span class="persistence-badge memory">MEMORY</span>
        </div>
        <div class="drawer-footer agents-note hidden" id="agents-footer"></div>
    </div>
    <div class="drawer-overlay" id="drawer-overlay"></div>

    <!-- Agent editor -->
    <div class="modal-overlay" id="agent-modal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="agent-modal-title">EDIT AGENT</div>
                <button class="modal-close" id="agent-modal-close" title="Close">&times;</button>
            </div>
            <div class="form-field">
                <label class="form-label" for="agent-form-name">NAME</label>
                <input class="form-input" id="agent-form-name" type="text" autocomplete="off" autocapitalize="none" spellcheck="false">
                <div class="form-hint" id="agent-form-name-hint"></div>
            </div>
            <div class="form-field">
                <label class="form-label" for="agent-form-schedule">SCHEDULE</label>
                <input class="form-input" id="agent-form-schedule" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="0 9 * * *">
                <div class="form-hint">5-field cron in the server's local time: minute hour day-of-month month day-of-week. 0 9 * * * runs at 09:00 daily.</div>
            </div>
            <div class="form-field">
                <label class="form-label" for="agent-form-prompt" id="agent-form-prompt-label">PROMPT</label>
                <textarea class="form-textarea" id="agent-form-prompt" spellcheck="false"></textarea>
                <div class="form-hint" id="agent-form-prompt-hint"></div>
            </div>
            <div class="form-field">
                <label class="form-label" for="agent-form-model">MODEL</label>
                <input class="form-input" id="agent-form-model" type="text" autocomplete="off" autocapitalize="none" spellcheck="false">
                <div class="form-hint" id="agent-form-model-hint"></div>
            </div>
            <div class="form-row">
                <div class="form-field">
                    <label class="form-label" for="agent-form-timeout">TIMEOUT (SECONDS)</label>
                    <input class="form-input" id="agent-form-timeout" type="number" min="1" step="1">
                    <div class="form-hint">A run that exceeds this is aborted and recorded as failed.</div>
                </div>
                <div class="form-field">
                    <label class="form-label" for="agent-form-working-dir">WORKING DIR</label>
                    <input class="form-input" id="agent-form-working-dir" type="text" autocomplete="off" autocapitalize="none" spellcheck="false">
                    <div class="form-hint">Blank uses the server's working directory.</div>
                </div>
            </div>
            <div class="form-field">
                <label class="form-check" for="agent-form-enabled">
                    <input type="checkbox" id="agent-form-enabled">
                    <span>ENABLED — a disabled agent stays listed but is never scheduled.</span>
                </label>
            </div>
            <div class="form-error hidden" id="agent-form-error"></div>
            <div class="modal-actions">
                <button class="btn-form btn-form-danger hidden" id="agent-form-delete">DELETE</button>
                <div class="modal-actions-spacer"></div>
                <button class="btn-form hidden" id="agent-form-reload">RELOAD</button>
                <button class="btn-form" id="agent-form-cancel">CANCEL</button>
                <button class="btn-form btn-form-primary" id="agent-form-save">SAVE</button>
            </div>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="header-row header-top">
                <button class="btn-menu" id="menu-btn" title="Sessions">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="logo">E U N I C E</div>
                <div class="header-spacer"></div>
                <button class="btn-api btn-new" id="new-btn">NEW</button>
                <div class="connection-status">
                    <div class="status-dot loading" id="status-dot"></div>
                    <span id="status-text">connecting</span>
                </div>
            </div>
            <div class="header-info-row">
                <span class="model-badge" id="model-badge">loading...</span>
                <span class="header-info" id="mode-display"></span>
                <span class="header-info" id="agent-display" style="display: none;"></span>
                <span class="header-info" id="tools-display">-</span>
                <span class="header-info" id="servers-display">-</span>
            </div>
        </header>

        <div class="messages" id="messages"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea
                    class="query-input"
                    id="query-input"
                    placeholder="Enter your query..."
                    rows="1"
                ></textarea>
                <button class="btn btn-cancel" id="cancel-btn">CANCEL</button>
                <button class="btn btn-primary" id="send-btn">SEND</button>
            </div>
        </div>

        <div class="status-bar" id="status-bar">
            <span id="version-display">-</span>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const queryInput = document.getElementById('query-input');
        const sendBtn = document.getElementById('send-btn');
        const cancelBtn = document.getElementById('cancel-btn');
        const modelBadge = document.getElementById('model-badge');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const modeDisplay = document.getElementById('mode-display');
        const agentDisplay = document.getElementById('agent-display');
        const serversDisplay = document.getElementById('servers-display');
        const toolsDisplay = document.getElementById('tools-display');

        let isRunning = false;
        let thinkingEl = null;
        let eventSource = null;
        let currentAgent = null;  // Current agent name for multi-agent mode

        // Session management - stored in localStorage for persistence across tab closes
        // When authenticated via proxy, server handles sessions per-user automatically
        const SESSION_KEY = 'eunice_session_id';
        const SESSION_NAME_KEY = 'eunice_session_name';
        let sessionId = localStorage.getItem(SESSION_KEY);
        let authenticatedUser = null;  // Set if user is authenticated via proxy

        // Check if session name is in URL hash (e.g., /#/sprawl-molly)
        function getSessionFromUrl() {
            const hash = window.location.hash;
            if (hash && hash.startsWith('#/')) {
                return hash.substring(2);  // Remove '#/'
            }
            return null;
        }

        // Update URL to reflect current session
        function updateSessionUrl(sessionName) {
            if (sessionName) {
                window.history.replaceState(null, '', '#/' + sessionName);
            } else {
                window.history.replaceState(null, '', window.location.pathname);
            }
        }

        // Check if message content contains system instructions (DMN mode)
        function isSystemInstructionMessage(content) {
            if (!content) return false;
            // DMN instructions start with this marker
            return content.includes('# DMN: DEFAULT MODE NETWORK') ||
                   content.includes('You are now in DMN (Default Mode Network) autonomous batch mode');
        }

        // Extract user's actual prompt from a DMN-wrapped message
        function extractUserPrompt(content) {
            if (!content) return content;
            const marker = '# USER REQUEST\n\n';
            const endMarker = '\n\n---\n\nYou are now in DMN';
            const startIdx = content.indexOf(marker);
            const endIdx = content.indexOf(endMarker);
            if (startIdx !== -1 && endIdx !== -1) {
                return content.substring(startIdx + marker.length, endIdx);
            }
            return content;
        }

        // Auto-resize textarea
        queryInput.addEventListener('input', () => {
            queryInput.style.height = 'auto';
            queryInput.style.height = Math.min(queryInput.scrollHeight, 150) + 'px';
        });

        // Handle Enter key
        queryInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendQuery();
            }
        });

        sendBtn.addEventListener('click', sendQuery);
        cancelBtn.addEventListener('click', cancelQuery);

        // Fetch initial status
        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();

                modelBadge.textContent = data.model;
                statusDot.className = 'status-dot';
                statusText.textContent = 'ready';

                // Header info (mode/agent/mcp_servers only existed pre-1.0;
                // guard everything so a missing field can't trip the catch
                // and falsely mark the connection as "error")
                modeDisplay.textContent = (data.mode || data.provider || '').toUpperCase();

                // Show agent name if present
                if (data.agent) {
                    currentAgent = data.agent;
                    agentDisplay.textContent = `agent: ${data.agent}`;
                    agentDisplay.style.display = 'inline';
                }

                toolsDisplay.textContent = `${data.tools_count} tools`;

                // Footer info
                serversDisplay.textContent = Array.isArray(data.mcp_servers) && data.mcp_servers.length > 0
                    ? data.mcp_servers.join(', ')
                    : (data.persistence_enabled ? 'sessions: persistent' : 'sessions: in-memory');
                document.getElementById('version-display').textContent = `v${data.version}`;

                // Handle authenticated user (from proxy headers)
                if (data.authenticated_user) {
                    authenticatedUser = data.authenticated_user;
                    statusText.textContent = authenticatedUser;
                    // When authenticated, server manages sessions - don't use localStorage
                    sessionId = null;
                }
            } catch (err) {
                statusDot.className = 'status-dot disconnected';
                statusText.textContent = 'error';
            }
        }

        function addMessage(type, content) {
            const el = document.createElement('div');
            el.className = `message ${type}`;
            el.innerHTML = content;
            messagesEl.appendChild(el);
            // Use scrollIntoView for reliable autoscroll
            el.scrollIntoView({ behavior: 'instant', block: 'end' });
            return el;
        }

        function removeThinking() {
            if (thinkingEl) {
                thinkingEl.remove();
                thinkingEl = null;
            }
        }

        async function sendQuery() {
            const query = queryInput.value.trim();
            if (!query || isRunning) return;

            isRunning = true;
            sendBtn.disabled = true;
            cancelBtn.classList.add('visible');
            queryInput.value = '';
            queryInput.style.height = 'auto';

            // Add user message
            addMessage('user', escapeHtml(query));

            // Add thinking indicator
            thinkingEl = addMessage('thinking', '<span class="cursor">|</span> Thinking... <span id="thinking-time">0</span>s');

            let receivedAnyEvent = false;

            try {
                const res = await fetch('/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: query, session_id: sessionId })
                });

                // Check for HTTP errors
                if (!res.ok) {
                    removeThinking();
                    const errorText = await res.text();
                    addMessage('error', `HTTP ${res.status}: ${errorText || res.statusText}`);
                    isRunning = false;
                    sendBtn.disabled = false;
                    cancelBtn.classList.remove('visible');
                    return;
                }

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) {
                        // Process any remaining buffer content
                        if (buffer.trim()) {
                            processSSEData(buffer);
                        }
                        break;
                    }

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        processSSEData(line);
                    }
                }

                function processSSEData(line) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data === 'ping') return;

                        try {
                            const event = JSON.parse(data);
                            receivedAnyEvent = true;
                            handleEvent(event);
                        } catch (e) {
                            console.error('Parse error:', e, data);
                            // Show parse errors to user if they contain useful info
                            if (data && data.length > 0) {
                                removeThinking();
                                addMessage('error', `Parse error: ${data}`);
                            }
                        }
                    }
                }

                // If stream ended without any events, show error
                if (!receivedAnyEvent) {
                    removeThinking();
                    addMessage('error', 'Connection closed without response');
                }
            } catch (err) {
                removeThinking();
                addMessage('error', `Connection error: ${err.message}`);
            }

            isRunning = false;
            sendBtn.disabled = false;
            cancelBtn.classList.remove('visible');
            removeThinking();
        }

        function handleEvent(event) {
            switch (event.type) {
                case 'thinking':
                    const timeEl = document.getElementById('thinking-time');
                    if (timeEl) {
                        timeEl.textContent = event.elapsed_seconds;
                    }
                    break;

                case 'tool_call':
                    removeThinking();
                    const agentPrefix = currentAgent ? `<span class="tool-agent">[${escapeHtml(currentAgent)}]</span> ` : '';
                    addMessage('tool-call', `
                        ${agentPrefix}<span class="tool-name">${escapeHtml(event.name)}</span>
                        <div class="tool-args">${escapeHtml(event.arguments)}</div>
                    `);
                    // Re-add thinking for tool execution
                    thinkingEl = addMessage('thinking', '<span class="cursor">|</span> Running...');
                    break;

                case 'tool_result':
                    removeThinking();
                    const truncatedNotice = event.truncated
                        ? '<div class="truncated-notice">... output truncated</div>'
                        : '';
                    addMessage('tool-result', `
                        <div class="tool-result-content">${escapeHtml(event.result)}</div>
                        ${truncatedNotice}
                    `);
                    // Re-add thinking indicator while waiting for next LLM response
                    thinkingEl = addMessage('thinking', '<span class="cursor">|</span> Thinking... <span id="thinking-time">0</span>s');
                    break;

                case 'agent_invoke':
                    removeThinking();
                    addMessage('agent-invoke', `
                        <span class="agent-icon">🔀</span>
                        <span class="agent-label">invoking</span>
                        <span class="agent-name">${escapeHtml(event.agent_name)}</span>
                        <div class="agent-task">${escapeHtml(event.task)}</div>
                    `);
                    // Show thinking while subagent runs
                    thinkingEl = addMessage('thinking', '<span class="cursor">|</span> Agent running...');
                    break;

                case 'agent_result':
                    removeThinking();
                    const agentTruncated = event.truncated
                        ? '<div class="truncated-notice">... output truncated</div>'
                        : '';
                    addMessage('agent-result', `
                        <span class="agent-icon">✓</span>
                        <span class="agent-label">returned</span>
                        <span class="agent-name">${escapeHtml(event.agent_name)}</span>
                        <div class="agent-result-content">${escapeHtml(event.result)}</div>
                        ${agentTruncated}
                    `);
                    // Re-add thinking for parent agent
                    thinkingEl = addMessage('thinking', '<span class="cursor">|</span> Thinking... <span id="thinking-time">0</span>s');
                    break;

                case 'response':
                    removeThinking();
                    addMessage('response', renderContent(event.content));
                    break;

                case 'error':
                    removeThinking();
                    addMessage('error', escapeHtml(event.message));
                    break;

                case 'session_id':
                    // Store session ID from server (for new or existing sessions)
                    sessionId = event.session_id;
                    localStorage.setItem(SESSION_KEY, sessionId);
                    break;

                case 'compacted':
                    // Show compaction notice
                    addMessage('system', `Context compacted: ${escapeHtml(event.message)}`);
                    break;

                case 'done':
                    removeThinking();
                    break;
            }
        }

        async function cancelQuery() {
            try {
                await fetch('/api/cancel', { method: 'POST' });
            } catch (err) {
                console.error('Cancel error:', err);
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // escapeHtml() leaves quotes intact, so it cannot be used inside an attribute value.
        function escapeAttr(str) {
            return escapeHtml(str === null || str === undefined ? '' : String(str)).replace(/"/g, '&quot;');
        }

        // Initialize markdown-it
        const md = window.markdownit ? window.markdownit({
            html: true,
            linkify: true,
            typographer: true,
            breaks: true
        }) : null;

        // Detect content type: 'markdown', 'html', or 'plain'
        function detectContentType(text) {
            if (!text || typeof text !== 'string') return 'plain';

            // Check for HTML tags (but not markdown code blocks)
            const htmlTagPattern = /<(div|span|p|table|tr|td|th|ul|ol|li|h[1-6]|br|hr|img|a|strong|em|b|i)[^>]*>/i;
            const hasHtmlTags = htmlTagPattern.test(text);

            // Check for markdown patterns
            const markdownPatterns = [
                /^#{1,6}\s+.+$/m,           // Headers: # Header
                /\*\*[^*]+\*\*/,            // Bold: **text**
                /\*[^*]+\*/,                // Italic: *text*
                /`[^`]+`/,                  // Inline code: `code`
                /```[\s\S]*?```/,           // Code blocks: ```code```
                /^\s*[-*+]\s+.+$/m,         // Unordered lists: - item
                /^\s*\d+\.\s+.+$/m,         // Ordered lists: 1. item
                /\[.+\]\(.+\)/,             // Links: [text](url)
                /^\s*>\s+.+$/m,             // Blockquotes: > quote
                /^\s*\|.+\|.+\|/m,          // Tables: | col | col |
            ];

            const hasMarkdown = markdownPatterns.some(pattern => pattern.test(text));

            // If text has HTML tags and looks like intentional HTML, render as HTML
            if (hasHtmlTags && !hasMarkdown) {
                return 'html';
            }

            // If text has markdown patterns, render as markdown
            if (hasMarkdown) {
                return 'markdown';
            }

            return 'plain';
        }

        // Generate unique ID for tabbed content
        let tabbedContentId = 0;

        // Render content based on detected type with tabbed view for HTML/Markdown
        function renderContent(text) {
            const contentType = detectContentType(text);

            switch (contentType) {
                case 'markdown':
                    if (md) {
                        return createTabbedContent(text, md.render(text), 'Markdown');
                    }
                    // Fallback if markdown-it not loaded
                    return escapeHtml(text);

                case 'html':
                    // Create tabbed view for HTML content
                    return createTabbedContent(text, text, 'HTML');

                case 'plain':
                default:
                    return escapeHtml(text);
            }
        }

        // Create a tabbed content view with Preview and Code tabs
        function createTabbedContent(rawText, renderedContent, contentLabel) {
            const id = `tabbed-${++tabbedContentId}`;
            return `
                <div class="tabbed-content" id="${id}">
                    <div class="tab-header">
                        <button class="tab-btn active" data-tab="preview" onclick="switchTab('${id}', 'preview')">Preview</button>
                        <button class="tab-btn" data-tab="code" onclick="switchTab('${id}', 'code')">${contentLabel} Code</button>
                    </div>
                    <div class="tab-body">
                        <div class="tab-panel preview-panel active">${renderedContent}</div>
                        <div class="tab-panel code-panel">${escapeHtml(rawText)}</div>
                    </div>
                </div>
            `;
        }

        // Switch tabs in tabbed content
        function switchTab(containerId, tabName) {
            const container = document.getElementById(containerId);
            if (!container) return;

            // Update tab buttons
            container.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tabName);
            });

            // Update tab panels
            container.querySelectorAll('.tab-panel').forEach(panel => {
                if (tabName === 'preview') {
                    panel.classList.toggle('active', panel.classList.contains('preview-panel'));
                } else {
                    panel.classList.toggle('active', panel.classList.contains('code-panel'));
                }
            });
        }

        // NEW button reference
        const newBtn = document.getElementById('new-btn');

        // Restore session history on page load
        async function restoreSessionHistory() {
            if (!sessionId) return;

            try {
                const res = await fetch('/api/session/history', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId })
                });

                const data = await res.json();

                if (!data.exists) {
                    // Session no longer exists on server, clear local storage
                    sessionId = null;
                    localStorage.removeItem(SESSION_KEY);
                    return;
                }

                // Render each message from history
                for (const msg of data.messages) {
                    switch (msg.role) {
                        case 'user':
                            // Filter out system instructions, extract actual user prompt
                            let userContent = msg.content;
                            if (isSystemInstructionMessage(userContent)) {
                                userContent = extractUserPrompt(userContent);
                            }
                            if (userContent && userContent.trim()) {
                                addMessage('user', escapeHtml(userContent));
                            }
                            break;

                        case 'assistant':
                            // Render tool calls if present
                            if (msg.tool_calls) {
                                for (const tc of msg.tool_calls) {
                                    addMessage('tool-call', `
                                        <span class="tool-name">${escapeHtml(tc.name)}</span>
                                        <div class="tool-args">${escapeHtml(tc.arguments)}</div>
                                    `);
                                }
                            }
                            // Render content if present
                            if (msg.content) {
                                addMessage('response', renderContent(msg.content));
                            }
                            break;

                        case 'tool':
                            addMessage('tool-result', `
                                <div class="tool-result-content">${escapeHtml(msg.result)}</div>
                            `);
                            break;
                    }
                }
            } catch (err) {
                console.error('Failed to restore session history:', err);
            }
        }

        // Reconnect to live events if there's an active query
        // This allows users to close the tab and reopen to see events that happened
        let reconnectController = null;
        let reconnectAttached = false;

        // Must run synchronously before a session switch: an aborted stream's
        // rejection lands a microtask later, too late to keep the send controls
        // it disabled from staying stuck on the next session.
        function stopReconnect() {
            if (reconnectController) {
                reconnectController.abort();
                reconnectController = null;
            }
            if (reconnectAttached) {
                reconnectAttached = false;
                isRunning = false;
                sendBtn.disabled = false;
                cancelBtn.classList.remove('visible');
            }
        }

        async function reconnectToEvents() {
            if (!sessionId) return;

            stopReconnect();
            const controller = new AbortController();
            const streamSessionId = sessionId;
            reconnectController = controller;

            console.log('[webapp] Reconnecting to session events:', sessionId.substring(0, 8));

            try {
                const response = await fetch('/api/session/events', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: streamSessionId }),
                    signal: controller.signal
                });

                if (!response.ok) {
                    console.error('[webapp] Failed to reconnect:', response.status);
                    return;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let hasReceivedEvents = false;

                // Add "Reconnecting..." indicator if we receive events
                let reconnectingMsg = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    // A read that resolved just before teardown must not paint
                    // the previous session's events into the new one.
                    if (reconnectController !== controller || sessionId !== streamSessionId) return;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            const jsonStr = line.substring(5).trim();
                            if (jsonStr === 'ping') continue;
                            if (!jsonStr) continue;

                            try {
                                const event = JSON.parse(jsonStr);

                                // Show reconnecting message on first event (if not Done)
                                if (!hasReceivedEvents && event.type !== 'done' && event.type !== 'session_id') {
                                    hasReceivedEvents = true;
                                    reconnectAttached = true;
                                    reconnectingMsg = addMessage('system', 'Reconnected - replaying events from background query...');
                                    isRunning = true;
                                    sendBtn.disabled = true;
                                    cancelBtn.classList.add('visible');
                                }

                                // Handle the event
                                handleEvent(event);

                                // If we got a done event, clean up
                                if (event.type === 'done') {
                                    reconnectAttached = false;
                                    isRunning = false;
                                    sendBtn.disabled = false;
                                    cancelBtn.classList.remove('visible');
                                    if (reconnectingMsg) {
                                        // Update the message to show completion
                                        reconnectingMsg.innerHTML = 'Background query completed - events restored';
                                    }
                                    return;
                                }
                            } catch (parseErr) {
                                console.error('[webapp] Failed to parse event:', parseErr, jsonStr);
                            }
                        }
                    }
                }
            } catch (err) {
                if (err.name === 'AbortError') return;
                console.error('[webapp] Error reconnecting to events:', err);
            } finally {
                if (reconnectController === controller) {
                    reconnectController = null;
                }
            }
        }

        // Session drawer elements
        const menuBtn = document.getElementById('menu-btn');
        const sessionDrawer = document.getElementById('session-drawer');
        const drawerOverlay = document.getElementById('drawer-overlay');
        const sessionList = document.getElementById('session-list');
        const drawerNewBtn = document.getElementById('drawer-new-btn');
        const drawerNewAgentBtn = document.getElementById('drawer-new-agent-btn');
        const persistenceStatus = document.getElementById('persistence-status');
        const drawerTabs = document.getElementById('drawer-tabs');
        const sessionsTabBtn = document.getElementById('tab-sessions');
        const agentsTabBtn = document.getElementById('tab-agents');
        const agentList = document.getElementById('agent-list');
        const agentsFooter = document.getElementById('agents-footer');

        let currentSessionName = null;
        let persistenceEnabled = false;

        function openDrawer() {
            sessionDrawer.classList.add('open');
            drawerOverlay.classList.add('visible');
            loadSessions();
            loadAgents();
            if (activeDrawerTab === 'agents') {
                startAgentsRefresh();
            }
        }

        function closeDrawer() {
            sessionDrawer.classList.remove('open');
            drawerOverlay.classList.remove('visible');
            stopAgentsRefresh();
        }

        menuBtn.addEventListener('click', openDrawer);
        drawerOverlay.addEventListener('click', closeDrawer);

        async function loadSessions() {
            try {
                const res = await fetch('/api/sessions');
                const data = await res.json();

                persistenceEnabled = data.persistent;

                // Update persistence badge
                const badge = persistenceStatus.querySelector('.persistence-badge');
                if (data.persistent) {
                    badge.textContent = 'PERSISTENT';
                    badge.classList.remove('memory');
                } else {
                    badge.textContent = 'MEMORY';
                    badge.classList.add('memory');
                }

                // Render session list
                if (data.sessions.length === 0) {
                    sessionList.innerHTML = '<div class="no-sessions">No sessions yet</div>';
                } else {
                    sessionList.innerHTML = data.sessions.map(session => {
                        const agentBadge = session.agent_name
                            ? `<span class="session-agent-badge" title="${escapeAttr(session.agent_name)}">⏰</span>`
                            : '';
                        return `
                        <div class="session-item ${session.id === sessionId ? 'active' : ''}" data-id="${escapeAttr(session.id)}" data-name="${escapeAttr(session.name)}">
                            <div class="session-info">
                                <div class="session-name">${agentBadge}${escapeHtml(session.name)}</div>
                                <div class="session-meta">
                                    ${escapeHtml(String(session.turn_count))} turns | ${escapeHtml(session.relative_time || '')}
                                </div>
                            </div>
                            <button class="session-delete" data-id="${escapeAttr(session.id)}" title="Delete session">&times;</button>
                        </div>
                    `;
                    }).join('');

                    // Add click handlers
                    sessionList.querySelectorAll('.session-info').forEach(el => {
                        el.addEventListener('click', () => {
                            const item = el.closest('.session-item');
                            selectSession(item.dataset.id, item.dataset.name);
                        });
                    });

                    sessionList.querySelectorAll('.session-delete').forEach(el => {
                        el.addEventListener('click', (e) => {
                            e.stopPropagation();
                            deleteSession(el.dataset.id);
                        });
                    });
                }
            } catch (err) {
                console.error('[webapp] Failed to load sessions:', err);
                sessionList.innerHTML = '<div class="no-sessions">Failed to load sessions</div>';
            }
        }

        async function selectSession(id, name) {
            stopReconnect();
            sessionId = id;
            currentSessionName = name;
            localStorage.setItem(SESSION_KEY, sessionId);
            localStorage.setItem(SESSION_NAME_KEY, name);
            updateSessionUrl(name);
            closeDrawer();

            // Clear messages, restore history, then attach to the live stream so a
            // scheduled run picked from the AGENTS tab is watchable while in flight.
            messagesEl.innerHTML = '';
            await restoreSessionHistory();
            reconnectToEvents();
        }

        async function deleteSession(id) {
            if (!confirm('Delete this session permanently?')) return;

            try {
                const res = await fetch('/api/session/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: id })
                });

                const data = await res.json();
                if (data.deleted) {
                    // If deleted current session, create new one
                    if (id === sessionId) {
                        await createNewSession();
                    }
                    loadSessions();
                }
            } catch (err) {
                console.error('[webapp] Failed to delete session:', err);
            }
        }

        async function createNewSession() {
            stopReconnect();
            try {
                const res = await fetch('/api/session/new', { method: 'POST' });
                const data = await res.json();

                sessionId = data.session_id;
                currentSessionName = data.session_name;
                localStorage.setItem(SESSION_KEY, sessionId);
                localStorage.setItem(SESSION_NAME_KEY, currentSessionName);
                updateSessionUrl(currentSessionName);

                // Clear messages
                messagesEl.innerHTML = '';
                queryInput.focus();
            } catch (err) {
                console.error('[webapp] Failed to create session:', err);
            }
        }

        drawerNewBtn.addEventListener('click', async () => {
            await createNewSession();
            loadSessions();
        });

        // Update NEW button to use new session creation
        newBtn.addEventListener('click', async () => {
            stopReconnect();
            if (authenticatedUser) {
                // Authenticated user - clear server-side and get new session
                try {
                    const res = await fetch('/api/session/clear', { method: 'POST' });
                    const data = await res.json();
                    if (data.cleared && data.session_id) {
                        // Update to new session from server
                        sessionId = data.session_id;
                        currentSessionName = data.session_name;
                        localStorage.setItem(SESSION_KEY, sessionId);
                        localStorage.setItem(SESSION_NAME_KEY, currentSessionName);
                        updateSessionUrl(currentSessionName);
                        console.log('[webapp] New session created:', sessionId, currentSessionName);
                    }
                } catch (err) {
                    console.error('[webapp] Failed to clear session:', err);
                }
                messagesEl.innerHTML = '';
                loadSessions(); // Refresh session list
            } else {
                await createNewSession();
            }
            queryInput.focus();
        });

        // ---- AGENTS tab (read-only view of /api/agents) ----

        const AGENTS_REFRESH_MS = 30000;

        let activeDrawerTab = 'sessions';
        let agentsFile = null;
        let agentsRefreshTimer = null;
        let agentsEditable = false;
        let agentsServerModel = '';
        let agentsReloadError = null;
        // Set when EDIT or the enable/disable toggle fails before the editor can open;
        // such a failure has nowhere else to report itself, so it goes in the footer.
        let agentsActionError = null;
        // Fingerprint the list was loaded with; every edit is submitted against it so a
        // change made on disk in the meantime is rejected instead of overwritten.
        let agentsFingerprint = '';
        const expandedAgents = new Set();

        function startAgentsRefresh() {
            stopAgentsRefresh();
            agentsRefreshTimer = setInterval(() => loadAgents(), AGENTS_REFRESH_MS);
        }

        function stopAgentsRefresh() {
            if (agentsRefreshTimer !== null) {
                clearInterval(agentsRefreshTimer);
                agentsRefreshTimer = null;
            }
        }

        function switchDrawerTab(tab) {
            if (tab === 'agents' && !agentsFile) return;

            activeDrawerTab = tab;
            const onAgents = tab === 'agents';

            sessionsTabBtn.classList.toggle('active', !onAgents);
            agentsTabBtn.classList.toggle('active', onAgents);
            sessionList.classList.toggle('hidden', onAgents);
            agentList.classList.toggle('hidden', !onAgents);
            persistenceStatus.classList.toggle('hidden', onAgents);
            agentsFooter.classList.toggle('hidden', !onAgents);
            drawerNewBtn.classList.toggle('hidden', onAgents);
            drawerNewAgentBtn.classList.toggle('hidden', !(onAgents && agentsEditable));

            if (onAgents) {
                loadAgents();
                startAgentsRefresh();
            } else {
                stopAgentsRefresh();
            }
        }

        sessionsTabBtn.addEventListener('click', () => switchDrawerTab('sessions'));
        agentsTabBtn.addEventListener('click', () => switchDrawerTab('agents'));

        function formatDuration(seconds) {
            const total = Math.max(0, Math.round(seconds));
            if (total < 60) return `${total}s`;

            const minutes = Math.floor(total / 60);
            if (minutes < 60) return `${minutes}m`;

            const hours = Math.floor(minutes / 60);
            if (hours < 24) {
                const rem = minutes % 60;
                return rem ? `${hours}h ${rem}m` : `${hours}h`;
            }

            const days = Math.floor(hours / 24);
            const rem = hours % 24;
            return rem ? `${days}d ${rem}h` : `${days}d`;
        }

        // next_run_at / last_run_at are unix seconds, or null when unknown.
        function relativeFuture(unixSeconds) {
            if (typeof unixSeconds !== 'number' || !isFinite(unixSeconds)) return null;
            const delta = unixSeconds - Date.now() / 1000;
            return delta <= 0 ? 'due now' : `in ${formatDuration(delta)}`;
        }

        function relativePast(unixSeconds) {
            if (typeof unixSeconds !== 'number' || !isFinite(unixSeconds)) return null;
            const delta = Date.now() / 1000 - unixSeconds;
            return delta < 5 ? 'just now' : `${formatDuration(delta)} ago`;
        }

        function agentDotClass(agent) {
            // `running` is a run in flight right now; last_status describes the previous run.
            if (agent.running || agent.last_status === 'running') return 'agent-dot running';
            if (!agent.enabled) return 'agent-dot';

            switch (agent.last_status) {
                case 'success': return 'agent-dot success';
                case 'failed': return 'agent-dot failed';
                case 'skipped': return 'agent-dot skipped';
                default: return 'agent-dot';
            }
        }

        function renderAgentCard(agent, serverModel) {
            const expanded = expandedAgents.has(agent.name);
            const model = agent.model
                ? escapeHtml(agent.model)
                : `${escapeHtml(serverModel)} (default)`;

            const nextRun = agent.enabled ? relativeFuture(agent.next_run_at) : null;
            const lastRun = relativePast(agent.last_run_at);

            const details = agent.running ? ['<div class="agent-field">running now</div>'] : [];
            if (agentsEditable) {
                details.push(`
                    <div class="agent-actions">
                        <button class="btn-agent" data-action="edit">EDIT</button>
                        <button class="btn-agent" data-action="toggle" data-enable="${agent.enabled ? 'false' : 'true'}">${agent.enabled ? 'DISABLE' : 'ENABLE'}</button>
                    </div>
                `);
            }
            details.push('<div class="agent-detail-label">PROMPT</div>');
            details.push(`<div class="agent-prompt">${escapeHtml(agent.prompt_preview || '')}</div>`);
            if (agent.prompt_file) {
                details.push(`<div class="agent-field">prompt_file: ${escapeHtml(agent.prompt_file)}</div>`);
            }
            if (agent.working_dir) {
                details.push(`<div class="agent-field">working_dir: ${escapeHtml(agent.working_dir)}</div>`);
            }
            if (agent.timeout_secs) {
                details.push(`<div class="agent-field">timeout: ${escapeHtml(String(agent.timeout_secs))}s</div>`);
            }
            if (agent.last_error) {
                details.push('<div class="agent-detail-label">LAST ERROR</div>');
                details.push(`<div class="agent-error">${escapeHtml(agent.last_error)}</div>`);
            }

            const recent = Array.isArray(agent.recent_sessions) ? agent.recent_sessions : [];
            details.push('<div class="agent-detail-label">RECENT RUNS</div>');
            if (recent.length === 0) {
                details.push('<div class="agent-field">no runs recorded</div>');
            } else {
                details.push(recent.map(session => `
                    <div class="agent-session" data-id="${escapeAttr(session.id)}" data-name="${escapeAttr(session.name)}">
                        <span class="agent-session-name">${escapeHtml(session.name)}</span>
                        <span class="agent-session-meta">${escapeHtml(session.relative_time || '')}</span>
                    </div>
                `).join(''));
            }

            return `
                <div class="agent-card${expanded ? ' expanded' : ''}${agent.enabled ? '' : ' disabled'}" data-name="${escapeAttr(agent.name)}">
                    <div class="agent-card-summary">
                        <div class="agent-card-head">
                            <span class="${agentDotClass(agent)}"></span>
                            <span class="agent-card-name">${escapeHtml(agent.name)}</span>
                            ${agent.enabled ? '' : '<span class="agent-disabled-label">DISABLED</span>'}
                        </div>
                        <div class="agent-card-meta">
                            <span class="agent-cron">${escapeHtml(agent.schedule)}</span> | ${model}
                        </div>
                        <div class="agent-card-meta">
                            next run ${nextRun ? escapeHtml(nextRun) : '—'} | ${lastRun ? `last run ${escapeHtml(lastRun)}` : 'never run'}
                        </div>
                    </div>
                    <div class="agent-detail${expanded ? '' : ' hidden'}">${details.join('')}</div>
                </div>
            `;
        }

        function renderAgents(agents, serverModel) {
            // The 30s refresh rebuilds the list wholesale; keep the reader's place.
            const scrollTop = agentList.scrollTop;

            if (agents.length === 0) {
                agentList.innerHTML = '<div class="no-sessions">No agents configured</div>';
                return;
            }

            agentList.innerHTML = agents.map(agent => renderAgentCard(agent, serverModel)).join('');
            agentList.scrollTop = scrollTop;

            agentList.querySelectorAll('.agent-card-summary').forEach(el => {
                el.addEventListener('click', () => {
                    const card = el.closest('.agent-card');
                    const name = card.dataset.name;
                    const nowExpanded = !expandedAgents.has(name);

                    if (nowExpanded) {
                        expandedAgents.add(name);
                    } else {
                        expandedAgents.delete(name);
                    }

                    card.classList.toggle('expanded', nowExpanded);
                    card.querySelector('.agent-detail').classList.toggle('hidden', !nowExpanded);
                });
            });

            agentList.querySelectorAll('.agent-session').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectSession(el.dataset.id, el.dataset.name);
                });
            });

            agentList.querySelectorAll('.btn-agent').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const name = el.closest('.agent-card').dataset.name;
                    if (el.dataset.action === 'edit') {
                        editAgent(name);
                    } else {
                        toggleAgentEnabled(name, el.dataset.enable === 'true');
                    }
                });
            });
        }

        function renderAgentsFooter() {
            let html = `<div>Agents are configured in ${escapeHtml(agentsFile || '')} — saved edits and changes made to the file directly apply without a restart.</div>`;
            if (agentsReloadError) {
                html += `<div class="agents-warning">agents.toml on disk is invalid and was not loaded; the previously loaded config is still running.\n${escapeHtml(agentsReloadError)}</div>`;
            }
            if (agentsActionError) {
                html += `<div class="agents-warning">${escapeHtml(agentsActionError)}</div>`;
            }
            agentsFooter.innerHTML = html;
        }

        function setAgentsActionError(message) {
            agentsActionError = message || null;
            renderAgentsFooter();
        }

        // `force` is for the editor's own refreshes: a background refresh is skipped while
        // the editor is open so it cannot re-render the list underneath unsaved input or
        // replace the fingerprint the open form was loaded with.
        async function loadAgents(force = false) {
            if (agentEditorOpen && !force) return;

            try {
                const res = await fetch('/api/agents');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                // A server started without --agents must look exactly as it did
                // before this tab existed, so hide it rather than showing it empty.
                if (!data.agents_file) {
                    agentsFile = null;
                    agentsEditable = false;
                    agentsFingerprint = '';
                    agentsReloadError = null;
                    agentsTabBtn.classList.add('hidden');
                    drawerNewAgentBtn.classList.add('hidden');
                    drawerTabs.classList.remove('tabbed');
                    if (activeDrawerTab === 'agents') {
                        switchDrawerTab('sessions');
                    }
                    return;
                }

                agentsFile = data.agents_file;
                agentsEditable = !!data.editable;
                agentsFingerprint = data.fingerprint || '';
                agentsReloadError = data.reload_error || null;
                agentsServerModel = data.server_model || '';
                agentsTabBtn.classList.remove('hidden');
                drawerTabs.classList.add('tabbed');
                drawerNewAgentBtn.classList.toggle('hidden', !(agentsEditable && activeDrawerTab === 'agents'));
                renderAgentsFooter();
                renderAgents(Array.isArray(data.agents) ? data.agents : [], agentsServerModel);
            } catch (err) {
                console.error('[webapp] Failed to load agents:', err);
                if (activeDrawerTab === 'agents') {
                    agentList.innerHTML = '<div class="no-sessions">Failed to load agents</div>';
                }
            }
        }

        // ---- Agent editor ----

        const agentModal = document.getElementById('agent-modal');
        const agentModalTitle = document.getElementById('agent-modal-title');
        const agentFormName = document.getElementById('agent-form-name');
        const agentFormNameHint = document.getElementById('agent-form-name-hint');
        const agentFormSchedule = document.getElementById('agent-form-schedule');
        const agentFormPromptLabel = document.getElementById('agent-form-prompt-label');
        const agentFormPrompt = document.getElementById('agent-form-prompt');
        const agentFormPromptHint = document.getElementById('agent-form-prompt-hint');
        const agentFormModel = document.getElementById('agent-form-model');
        const agentFormModelHint = document.getElementById('agent-form-model-hint');
        const agentFormTimeout = document.getElementById('agent-form-timeout');
        const agentFormWorkingDir = document.getElementById('agent-form-working-dir');
        const agentFormEnabled = document.getElementById('agent-form-enabled');
        const agentFormError = document.getElementById('agent-form-error');
        const agentFormReloadBtn = document.getElementById('agent-form-reload');
        const agentFormDeleteBtn = document.getElementById('agent-form-delete');
        const agentFormCancelBtn = document.getElementById('agent-form-cancel');
        const agentFormSaveBtn = document.getElementById('agent-form-save');
        const agentModalCloseBtn = document.getElementById('agent-modal-close');

        const NAME_HINT_EDIT = 'Renaming is not supported: run state and past sessions are keyed to this name. Create a new agent to use a different one.';
        const NAME_HINT_NEW = 'Lowercase letters, digits and dashes, e.g. daily-digest. It cannot be changed once saved.';
        const DEFAULT_TIMEOUT_SECS = 600;

        let agentEditorOpen = false;
        let agentEditorTarget = null;      // null while creating
        let agentEditorPromptFile = null;  // set when the prompt lives outside agents.toml
        // The open form submits against the fingerprint it was opened with. A background
        // refresh that was already in flight can still land on agentsFingerprint, and
        // submitting that would defeat the conflict check.
        let agentEditorFingerprint = '';
        let agentDeleteArmed = false;

        // kind: 'error' (coral), 'conflict' (offers RELOAD), 'notice', or null to clear.
        function setAgentFormMessage(message, kind) {
            agentFormError.textContent = message || '';
            agentFormError.classList.toggle('hidden', !message);
            agentFormError.classList.toggle('notice', kind === 'conflict' || kind === 'notice');
            agentFormReloadBtn.classList.toggle('hidden', kind !== 'conflict');
        }

        function disarmAgentDelete() {
            agentDeleteArmed = false;
            agentFormDeleteBtn.textContent = 'DELETE';
            agentFormDeleteBtn.classList.remove('armed');
        }

        function setAgentFormBusy(busy) {
            [agentFormSaveBtn, agentFormDeleteBtn, agentFormCancelBtn, agentFormReloadBtn].forEach(btn => {
                btn.disabled = busy;
            });
        }

        // `detail` is an /api/agents/get payload, or null to open a blank create form.
        function showAgentEditor(detail) {
            const creating = !detail;

            agentEditorOpen = true;
            agentEditorTarget = creating ? null : detail.name;
            agentEditorPromptFile = creating ? null : (detail.prompt_file || null);
            agentEditorFingerprint = agentsFingerprint;

            agentModalTitle.textContent = creating ? 'NEW AGENT' : 'EDIT AGENT';
            agentFormName.value = creating ? '' : detail.name;
            agentFormName.readOnly = !creating;
            agentFormNameHint.textContent = creating ? NAME_HINT_NEW : NAME_HINT_EDIT;
            agentFormSchedule.value = creating ? '' : detail.schedule;
            agentFormPrompt.value = creating ? '' : detail.prompt;
            agentFormModel.value = creating ? '' : (detail.model || '');
            agentFormTimeout.value = creating ? String(DEFAULT_TIMEOUT_SECS) : String(detail.timeout_secs);
            agentFormWorkingDir.value = creating ? '' : (detail.working_dir || '');
            agentFormEnabled.checked = creating ? true : detail.enabled;

            if (agentEditorPromptFile) {
                agentFormPromptLabel.textContent = 'PROMPT FILE';
                agentFormPromptHint.textContent = `Saving writes ${agentEditorPromptFile}; agents.toml keeps the prompt_file reference.`;
            } else {
                agentFormPromptLabel.textContent = 'PROMPT';
                agentFormPromptHint.textContent = 'Stored inline in agents.toml.';
            }

            agentFormModelHint.textContent = agentsServerModel
                ? `Blank uses the server default (${agentsServerModel}).`
                : 'Blank uses the server default.';

            agentFormDeleteBtn.classList.toggle('hidden', creating);
            disarmAgentDelete();
            setAgentFormMessage('', null);
            setAgentFormBusy(false);

            agentModal.classList.add('visible');
            (creating ? agentFormName : agentFormSchedule).focus();
        }

        function closeAgentEditor() {
            agentEditorOpen = false;
            agentEditorTarget = null;
            agentEditorPromptFile = null;
            agentEditorFingerprint = '';
            agentModal.classList.remove('visible');
            disarmAgentDelete();
            setAgentFormMessage('', null);
        }

        async function fetchAgentDetail(name) {
            try {
                const res = await fetch('/api/agents/get', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const data = await res.json();
                agentsFingerprint = data.fingerprint || agentsFingerprint;

                if (!data.found || !data.agent) {
                    // Removed from the file since the list was rendered; the refresh
                    // makes that plain rather than opening an editor over nothing.
                    await loadAgents(true);
                    return null;
                }
                return data.agent;
            } catch (err) {
                console.error('[webapp] Failed to load agent:', err);
                setAgentsActionError(`Could not load '${name}': ${err.message}. This also happens when agents.toml on disk is invalid.`);
                return null;
            }
        }

        async function editAgent(name) {
            setAgentsActionError(null);
            const detail = await fetchAgentDetail(name);
            if (detail) showAgentEditor(detail);
        }

        function agentSavePayload(detail, enabled) {
            return {
                original_name: detail.name,
                fingerprint: agentsFingerprint,
                name: detail.name,
                schedule: detail.schedule,
                prompt: detail.prompt,
                model: detail.model || '',
                enabled,
                timeout_secs: detail.timeout_secs,
                working_dir: detail.working_dir || ''
            };
        }

        // Posts an edit and reports the outcome in the editor. Every failure leaves the
        // modal open so nothing the user typed is lost.
        async function submitAgentEdit(url, payload) {
            setAgentFormBusy(true);
            disarmAgentDelete();

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) {
                    setAgentFormMessage(`request failed: HTTP ${res.status}`, 'error');
                    return;
                }

                const data = await res.json();
                if (data.ok) {
                    agentsFingerprint = data.fingerprint || agentsFingerprint;
                    closeAgentEditor();
                    await loadAgents(true);
                    return;
                }

                // The server's validation messages are written for humans; show them as-is.
                setAgentFormMessage(data.error || 'the change was rejected', data.conflict ? 'conflict' : 'error');
            } catch (err) {
                setAgentFormMessage(`request failed: ${err.message}`, 'error');
            } finally {
                setAgentFormBusy(false);
            }
        }

        async function submitAgentForm() {
            // A blank or non-numeric timeout would fail JSON deserialization server-side
            // and come back as an unreadable 422, so it is caught here instead. The digits
            // test is what rejects '1e3' and '12abc', which parseInt would quietly read as
            // 1 and 12; type=number's min/step do not reject them either.
            const timeoutRaw = agentFormTimeout.value.trim();
            const timeoutSecs = /^\d+$/.test(timeoutRaw) ? Number(timeoutRaw) : NaN;
            if (!Number.isSafeInteger(timeoutSecs) || timeoutSecs <= 0) {
                setAgentFormMessage('timeout must be a whole number of seconds greater than zero', 'error');
                return;
            }

            await submitAgentEdit('/api/agents/save', {
                original_name: agentEditorTarget,
                fingerprint: agentEditorFingerprint,
                name: agentFormName.value.trim(),
                schedule: agentFormSchedule.value.trim(),
                prompt: agentFormPrompt.value,
                model: agentFormModel.value.trim(),
                enabled: agentFormEnabled.checked,
                timeout_secs: timeoutSecs,
                working_dir: agentFormWorkingDir.value.trim()
            });
        }

        async function toggleAgentEnabled(name, enable) {
            setAgentsActionError(null);
            const detail = await fetchAgentDetail(name);
            if (!detail) return;

            try {
                const res = await fetch('/api/agents/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(agentSavePayload(detail, enable))
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const data = await res.json();
                if (data.ok) {
                    agentsFingerprint = data.fingerprint || agentsFingerprint;
                    await loadAgents(true);
                    return;
                }

                // A rejected toggle has nowhere to report itself in the list, so hand it
                // to the editor with the server's message.
                showAgentEditor(detail);
                agentFormEnabled.checked = enable;
                setAgentFormMessage(data.error || 'the change was rejected', data.conflict ? 'conflict' : 'error');
            } catch (err) {
                console.error('[webapp] Failed to toggle agent:', err);
                setAgentsActionError(`Could not ${enable ? 'enable' : 'disable'} '${name}': ${err.message}`);
            }
        }

        // Offered after a conflict: picks up whatever is on disk now and hands back a
        // current fingerprint, without touching what the user has typed.
        async function reloadAgentsFromDisk() {
            setAgentFormBusy(true);
            try {
                await fetch('/api/agents/reload', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: '{}'
                });
                await loadAgents(true);
                // Adopt the fingerprint just read from disk, otherwise SAVE would still
                // be submitting the stale one this reload was offered to resolve.
                agentEditorFingerprint = agentsFingerprint;

                const suffix = agentsReloadError ? `\n\n${agentsReloadError}` : '';
                setAgentFormMessage(
                    'Reloaded from disk. Your changes above were kept — press SAVE to write them over the current file.' + suffix,
                    'notice'
                );
            } catch (err) {
                setAgentFormMessage(`reload failed: ${err.message}`, 'error');
            } finally {
                setAgentFormBusy(false);
            }
        }

        drawerNewAgentBtn.addEventListener('click', () => showAgentEditor(null));
        agentFormSaveBtn.addEventListener('click', submitAgentForm);
        agentFormReloadBtn.addEventListener('click', reloadAgentsFromDisk);
        agentFormCancelBtn.addEventListener('click', closeAgentEditor);
        agentModalCloseBtn.addEventListener('click', closeAgentEditor);

        agentFormDeleteBtn.addEventListener('click', () => {
            if (!agentEditorTarget) return;

            if (!agentDeleteArmed) {
                agentDeleteArmed = true;
                agentFormDeleteBtn.textContent = 'CONFIRM DELETE';
                agentFormDeleteBtn.classList.add('armed');
                setAgentFormMessage(
                    `Deleting '${agentEditorTarget}' removes it from agents.toml. Sessions it already ran are kept.`,
                    'notice'
                );
                return;
            }

            submitAgentEdit('/api/agents/delete', {
                name: agentEditorTarget,
                fingerprint: agentEditorFingerprint
            });
        });

        // Find session by name from server
        async function findSessionByName(name) {
            try {
                const res = await fetch('/api/sessions');
                const data = await res.json();
                return data.sessions.find(s => s.name === name);
            } catch (err) {
                console.error('[webapp] Failed to find session by name:', err);
                return null;
            }
        }

        // Initialize - check URL for session name first
        async function init() {
            await fetchStatus();

            // Check if there's a session name in URL
            const urlSessionName = getSessionFromUrl();
            if (urlSessionName) {
                console.log('[webapp] Loading session from URL:', urlSessionName);
                const session = await findSessionByName(urlSessionName);
                if (session) {
                    sessionId = session.id;
                    currentSessionName = session.name;
                    localStorage.setItem(SESSION_KEY, sessionId);
                    localStorage.setItem(SESSION_NAME_KEY, session.name);
                } else {
                    // Session not found, clear URL
                    console.log('[webapp] Session not found:', urlSessionName);
                    updateSessionUrl(null);
                }
            } else if (sessionId) {
                // Have session ID from localStorage, update URL with name
                const savedName = localStorage.getItem(SESSION_NAME_KEY);
                if (savedName) {
                    currentSessionName = savedName;
                    updateSessionUrl(savedName);
                }
            } else {
                // No session in URL or localStorage - try to load the most recent session
                try {
                    const res = await fetch('/api/sessions');
                    const data = await res.json();
                    if (data.sessions && data.sessions.length > 0) {
                        const mostRecent = data.sessions[0];
                        sessionId = mostRecent.id;
                        currentSessionName = mostRecent.name;
                        localStorage.setItem(SESSION_KEY, sessionId);
                        localStorage.setItem(SESSION_NAME_KEY, mostRecent.name);
                        updateSessionUrl(mostRecent.name);
                        console.log('[webapp] Loaded most recent session:', mostRecent.name);
                    }
                } catch (err) {
                    console.error('[webapp] Failed to fetch sessions:', err);
                }
            }

            await restoreSessionHistory();
            reconnectToEvents();
            queryInput.focus();
        }

        init();
    </script>
</body>
</html>
