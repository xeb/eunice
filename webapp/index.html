        // The one way out of the editor, used by '← AGENTS', CANCEL, a successful save and
        // a successful delete. Closing before navigating is what keeps the hashchange that
        // follows from asking about the same changes again.
        //
        // The index is claimed here rather than left to the router because closeAgentEditor
        // puts the chat view back on screen, and the hashchange that would hide it again is
        // a task away — long enough to paint a frame of chat nobody asked for. The rows
        // already rendered stay up until the route's own refetch replaces them.
        function returnToAgentIndex() {
            closeAgentEditor();
            showAgentIndexPage();
            navigateToAgentIndex();
        }

        // Used by '← AGENTS' and CANCEL; the save path guards itself and calls
        // returnToAgentIndex directly.
        async function leaveAgentEditor() {
            if (!await confirmLeaveAgentEditor()) return;
            returnToAgentIndex();
        }

        // `name` is null on the create route.
        async function openAgentRoute(name) {
            // Claim the view before the fetches, so a deep link does not flash the chat
            // view while the agent behind it loads.
            agentPageTitle.textContent = 'LOADING';
            agentPageForm.classList.add('hidden');
            agentPageMissing.classList.add('hidden');
            showAgentPage();

            // The editor cannot exist without a writable agents.toml, and /api/agents is
            // the only thing that knows, so a deep link has to wait for it.
            if (!agentsFile) await loadAgents(true);

            if (!agentsFile) {
                // A server started without --agents has no agent list to fall back to.
                navigateToChat();
                return;
            }

            if (!agentsEditable) {
                // Nothing here to edit; land on the index, which renders a read-only config
                // perfectly well, rather than dead-ending on a form whose every save the
                // server would reject.
                navigateToAgentIndex();
                return;
            }

            setAgentsActionError(null);

            if (name === null) {
                showAgentEditor(null);
                return;
            }

            const detail = await fetchAgentDetail(name);
            if (detail) {
                showAgentEditor(detail);
            } else {
                showAgentNotFound(name);
            }
        }

        async function openAgentIndexRoute() {
            // Claim the view before the fetch, for the same reason the editor route does:
            // a deep link must not flash the chat view while /api/agents loads.
            closeAgentEditor();
            showAgentIndexLoading();
            showAgentIndexPage();

            // Always refetched rather than trusting whatever the drawer last loaded: this
            // is also how a deep link discovers whether the server has agents at all, and
            // loadAgents paints the index as part of the same round trip.
            await loadAgents(true);

            if (!agentsFile) {
                // A server started without --agents has no list to show. The editor route
                // bails to chat in the same situation.
                navigateToChat();
                return;
            }

            // The rows carry relative times, so keep them refreshing for as long as the
            // page is on screen. applyRoute stops the timer on the way out.
            startAgentsRefresh();
        }

        // Shows exactly one of the chat view, the agent index and the editor page.
        async function applyRoute() {
            // Recorded here rather than in the hashchange handler so that every way in —
            // deep link, manual re-route, initial load — leaves the guard below with an
            // accurate idea of which URL is actually on screen.
            appliedRouteHash = window.location.hash;

            const route = parseRoute();

            // The index owns the agents refresh timer while it is the visible page; every
            // other route takes it down on the way in. Opening the drawer on AGENTS starts
            // its own, so nothing is lost.
            if (currentRouteView === 'agentIndex' && route.view !== 'agentIndex') {
                stopAgentsRefresh();
            }

            if (route.view === 'agentIndex') {
                currentRouteView = 'agentIndex';
                await openAgentIndexRoute();
                return;
            }

            if (route.view === 'agent') {
                currentRouteView = 'agent';
                await openAgentRoute(route.name);
                return;
            }

            if (route.view === 'sessions') {
                currentRouteView = 'sessions';
                closeAgentEditor();
                showView('sessions');
                loadSessions();
                return;
            }

            const wasElsewhere = currentRouteView !== 'chat';
            currentRouteView = 'chat';
            closeAgentEditor();
            showView('chat');
            if (wasElsewhere) queryInput.focus();
        }

        // ---- Dirty-navigation guard ----
        //
        // window.confirm could block a hashchange; a promise cannot. So a navigation away
        // from a dirty editor is undone first — putting the hash back leaves the editor
        // mounted with everything typed still in it — and replayed only if the user
        // discards. Restoring the hash fires another hashchange, hence the re-entrancy
        // flag; without it the handler would see its own rewind and loop.

        // The hash applyRoute last acted on, and therefore what a rewind restores.
        let appliedRouteHash = window.location.hash;
        let restoringRouteHash = false;
        // The route a dirty navigation is waiting on. A second navigation arriving while
        // the dialog is up overwrites this rather than opening a dialog of its own, so
        // the answer applies to wherever the user most recently tried to go.
        let pendingRouteHash = null;

        async function handleHashChange() {
            if (restoringRouteHash) {
                restoringRouteHash = false;
                return;
            }

            const target = window.location.hash;
            if (!agentFormDirty() || target === appliedRouteHash) {
                await applyRoute();
                return;
            }

            const alreadyAsking = pendingRouteHash !== null;
            pendingRouteHash = target;

            restoringRouteHash = true;
            window.location.hash = appliedRouteHash;

            // The dialog already up answers for this target too.
            if (alreadyAsking) return;

            const discard = await confirmLeaveAgentEditor();
            const replay = pendingRouteHash;
            pendingRouteHash = null;
            if (!discard) return;

            closeAgentEditor();
            if (window.location.hash === replay) {
                await applyRoute();
            } else {
                // Pushed rather than rewound: a hashchange does not say which direction
                // the user went, so history.go() cannot be aimed. The cost is one extra
                // entry — a back press from here lands on the editor route rather than
                // skipping past it — in exchange for the URL always telling the truth.
                //
                // Paint the destination synchronously; the hash assignment fires
                // applyRoute asynchronously, and without this the gap shows no
                // surface at all (main is display:none from the editor route).
                const dest = parseRoute(replay).view;
                showView(dest === 'agent' ? 'editor' : (dest === 'agentIndex' ? 'agents' : dest));
                window.location.hash = replay;
            }
        }

        window.addEventListener('hashchange', handleHashChange);

        // Find session by name from server
        async function findSessionByName(name) {
            try {
                const res = await fetch('/api/sessions');
                const data = await res.json();
                return data.sessions.find(s => s.name === name);
            } catch (err) {
                console.error('[webapp] Failed to find session by name:', err);
                return null;
            }
        }

        // Initialize - check URL for session name first
        async function init() {
            await fetchStatus();

            // Check if there's a session name in URL
            const urlSessionName = getSessionFromUrl();
            if (urlSessionName) {
                console.log('[webapp] Loading session from URL:', urlSessionName);
                const session = await findSessionByName(urlSessionName);
                if (session) {
                    sessionId = session.id;
                    currentSessionName = session.name;
                    localStorage.setItem(SESSION_KEY, sessionId);
                    localStorage.setItem(SESSION_NAME_KEY, session.name);
                } else {
                    // Session not found, clear URL
                    console.log('[webapp] Session not found:', urlSessionName);
                    updateSessionUrl(null);
                }
            } else if (sessionId) {
                // Have session ID from localStorage, update URL with name
                const savedName = localStorage.getItem(SESSION_NAME_KEY);
                if (savedName) {
                    currentSessionName = savedName;
                    updateSessionUrl(savedName);
                }
            } else {
                // No session in URL or localStorage - try to load the most recent session
                try {
                    const res = await fetch('/api/sessions');
                    const data = await res.json();
                    if (data.sessions && data.sessions.length > 0) {
                        const mostRecent = data.sessions[0];
                        sessionId = mostRecent.id;
                        currentSessionName = mostRecent.name;
                        localStorage.setItem(SESSION_KEY, sessionId);
                        localStorage.setItem(SESSION_NAME_KEY, mostRecent.name);
                        updateSessionUrl(mostRecent.name);
                        console.log('[webapp] Loaded most recent session:', mostRecent.name);
                    }
                } catch (err) {
                    console.error('[webapp] Failed to fetch sessions:', err);
                }
            }

            await restoreSessionHistory();
            reconnectToEvents();
            // Only the chat view owns the input; focusing it from under either agent page
            // would scroll the page the user is actually looking at.
            if (currentRouteView === 'chat') queryInput.focus();
        }

        // Top-bar tabs drive the hash; an unchanged hash fires no hashchange, so re-route
        // by hand. Chat carries the active session so switching back reopens it.
        document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
            const r = t.dataset.route;
            const target = r === 'chat' ? (currentSessionName ? '#/' + currentSessionName : '#/chat')
                         : r === 'sessions' ? '#/sessions' : '#/agents';
            if (window.location.hash === target) applyRoute(); else window.location.hash = target;
        }));
        document.getElementById('session-filter').addEventListener('input', e => renderSessionFilter(e.target.value));

        // The router owns which view is showing and runs ahead of init's network work, so
        // an '#/agent/...' deep link never flashes the chat view. init() still resolves the
        // chat session behind it — leaving the editor has to land somewhere real.
        applyRoute();
        init();
    </script>
</body>
</html>
