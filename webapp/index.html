<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💎</text></svg>">
    <title>EUNICE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafafa;
            --bg-card: #ffffff;
            --bg-input: #f5f5f5;
            --text: #1a1a1a;
            --text-muted: #888888;
            --border: #e0e0e0;
            --border-strong: #1a1a1a;
            --neon-cyan: #00e5ff;
            --neon-magenta: #ff00ff;
            --neon-coral: #ff6b6b;
            --neon-mint: #00ffaa;
            --neon-yellow: #ffee00;
            --grid-line: rgba(0,0,0,0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 0 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            padding: 24px 0 16px;
            border-bottom: 1px solid var(--border-strong);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-top {
            gap: 12px;
        }

        .header-spacer {
            flex: 1;
        }

        .header-info-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.3em;
            color: var(--text);
        }

        .status {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 12px;
        }

        .model-badge {
            padding: 4px 10px;
            border: 1px solid var(--border-strong);
            font-weight: 500;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--neon-mint);
        }

        .status-dot.disconnected {
            background: var(--neon-coral);
        }

        .status-dot.loading {
            background: var(--neon-yellow);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            padding: 12px 16px;
            border-left: 3px solid transparent;
            background: var(--bg-card);
            animation: slideIn 0.15s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .message.user {
            border-left-color: var(--border-strong);
        }

        .message.user::before {
            content: '> ';
            color: var(--text-muted);
        }

        .message.thinking {
            border-left-color: var(--neon-yellow);
            color: var(--text-muted);
        }

        .message.thinking .cursor {
            display: inline-block;
            animation: blink 0.5s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .message.tool-call {
            border-left-color: var(--neon-cyan);
        }

        .tool-name {
            font-weight: 600;
            color: var(--text);
        }

        .tool-agent {
            font-size: 11px;
            color: var(--neon-magenta);
            font-weight: 500;
        }

        .tool-args {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 4px;
            word-break: break-all;
        }

        .message.tool-result {
            border-left-color: var(--neon-mint);
        }

        .tool-result-content {
            white-space: pre-wrap;
            font-size: 13px;
            max-height: 200px;
            overflow-y: auto;
        }

        .tool-result-content.collapsed {
            max-height: 100px;
        }

        /* Agent invocation styles (multi-agent mode) */
        .message.agent-invoke {
            border-left-color: var(--neon-magenta);
            background: linear-gradient(90deg, rgba(230, 0, 126, 0.1) 0%, transparent 100%);
        }

        .message.agent-result {
            border-left-color: var(--neon-mint);
            background: linear-gradient(90deg, rgba(0, 255, 163, 0.1) 0%, transparent 100%);
        }

        .agent-icon {
            margin-right: 6px;
        }

        .agent-label {
            color: var(--text-muted);
            font-size: 12px;
            margin-right: 6px;
        }

        .agent-name {
            font-weight: 600;
            color: var(--neon-magenta);
        }

        .agent-task {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 4px;
            font-style: italic;
        }

        .agent-result-content {
            white-space: pre-wrap;
            font-size: 13px;
            margin-top: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .truncated-notice {
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 8px;
            cursor: pointer;
        }

        .truncated-notice:hover {
            color: var(--neon-cyan);
        }

        .message.response {
            border-left-color: transparent;
            white-space: pre-wrap;
        }

        .message.error {
            border-left-color: var(--neon-coral);
            color: var(--neon-coral);
        }

        .message.system {
            border-left-color: var(--neon-yellow);
            color: var(--text-secondary);
            font-style: italic;
        }

        /* Input Area */
        .input-area {
            padding: 16px 0 24px;
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
        }

        .query-input {
            flex: 1;
            padding: 12px 16px;
            font-family: inherit;
            font-size: 14px;
            border: 1px solid var(--border-strong);
            background: var(--bg-input);
            color: var(--text);
            resize: none;
            min-height: 48px;
            max-height: 150px;
            transition: box-shadow 0.1s;
        }

        .query-input:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--neon-cyan);
        }

        .query-input::placeholder {
            color: var(--text-muted);
        }

        .btn {
            padding: 12px 24px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid var(--border-strong);
            cursor: pointer;
            transition: all 0.1s;
        }

        .btn-primary {
            background: var(--text);
            color: var(--bg);
        }

        .btn-primary:hover {
            background: #333;
        }

        .btn-primary:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        .btn-cancel {
            background: var(--bg);
            color: var(--neon-coral);
            border-color: var(--neon-coral);
            display: none;
        }

        .btn-cancel.visible {
            display: block;
        }

        .btn-cancel:hover {
            background: var(--neon-coral);
            color: var(--bg);
        }

        /* Status Bar */
        .status-bar {
            padding: 12px 0;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .status-bar span::after {
            content: ' \25C6';
            margin-left: 8px;
        }

        .status-bar span:last-child::after {
            content: '';
        }

        .mode-badge {
            font-weight: 600;
            color: var(--text);
        }

        .header-info {
            font-size: 11px;
            color: var(--text-muted);
            padding: 2px 6px;
            border: 1px solid var(--border);
        }

        /* API Button */
        .btn-api {
            padding: 4px 10px;
            font-size: 12px;
            background: transparent;
            border: 1px solid var(--border-strong);
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
        }

        .btn-api:hover {
            background: var(--text);
            color: var(--bg);
        }

        .btn-new {
            background: var(--neon-mint);
            color: var(--bg);
            border-color: var(--neon-mint);
        }

        /* Hamburger Menu Button */
        .btn-menu {
            background: none;
            border: 1px solid var(--border-strong);
            padding: 4px 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-menu:hover {
            background: var(--text);
            color: var(--bg);
        }

        .btn-menu svg {
            width: 16px;
            height: 16px;
        }

        /* Session Drawer */
        .session-drawer {
            position: fixed;
            top: 0;
            left: -320px;
            width: 300px;
            height: 100vh;
            background: var(--bg-card);
            border-right: 1px solid var(--border-strong);
            z-index: 1001;
            transition: left 0.2s ease-out;
            display: flex;
            flex-direction: column;
        }

        .session-drawer.open {
            left: 0;
        }

        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: none;
        }

        .drawer-overlay.visible {
            display: block;
        }

        .drawer-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-new-session {
            padding: 4px 10px;
            font-size: 11px;
            background: var(--neon-mint);
            color: var(--bg);
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            white-space: nowrap;
        }

        .btn-new-session:hover {
            opacity: 0.8;
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .session-item {
            padding: 12px 16px;
            cursor: pointer;
            border-left: 3px solid transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .session-item:hover {
            background: var(--bg-input);
        }

        .session-item.active {
            border-left-color: var(--neon-cyan);
            background: var(--bg-input);
        }

        .session-info {
            flex: 1;
            min-width: 0;
        }

        .session-name {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .session-meta {
            font-size: 11px;
            color: var(--text-muted);
        }

        .session-delete {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 8px;
            font-size: 16px;
            line-height: 1;
        }

        .session-delete:hover {
            color: var(--neon-coral);
        }

        .drawer-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            font-size: 10px;
            color: var(--text-muted);
        }

        .persistence-badge {
            background: var(--neon-mint);
            color: var(--bg);
            padding: 2px 6px;
            font-weight: 600;
        }

        .persistence-badge.memory {
            background: var(--neon-yellow);
        }

        .no-sessions {
            padding: 20px 16px;
            color: var(--text-muted);
            font-size: 12px;
            text-align: center;
        }

        /* Drawer Tabs */
        .drawer-tabs {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        /* Without the AGENTS tab this must render identically to the plain
           SESSIONS title it replaced, so the untabbed state carries no affordance. */
        .drawer-tab {
            font-family: inherit;
            font-weight: 700;
            letter-spacing: 0.2em;
            font-size: 12px;
            background: none;
            border: none;
            padding: 0;
            color: var(--text);
            cursor: default;
        }

        .drawer-tabs.tabbed .drawer-tab {
            cursor: pointer;
            color: var(--text-muted);
            padding-bottom: 2px;
            border-bottom: 2px solid transparent;
        }

        .drawer-tabs.tabbed .drawer-tab.active {
            color: var(--text);
            border-bottom-color: var(--neon-cyan);
        }

        .session-agent-badge {
            font-size: 11px;
            margin-right: 4px;
        }

        /* Agents Tab */
        .agent-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .agent-card {
            padding: 12px 16px;
            border-left: 3px solid transparent;
        }

        .agent-card:hover {
            background: var(--bg-input);
        }

        .agent-card.expanded {
            border-left-color: var(--neon-cyan);
            background: var(--bg-input);
        }

        .agent-card.disabled {
            opacity: 0.45;
        }

        .agent-card-summary {
            cursor: pointer;
        }

        .agent-card-head {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .agent-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            flex-shrink: 0;
        }

        .agent-dot.success {
            background: var(--neon-mint);
        }

        .agent-dot.failed {
            background: var(--neon-coral);
        }

        .agent-dot.skipped {
            background: var(--neon-yellow);
        }

        .agent-dot.running {
            background: var(--neon-cyan);
            animation: pulse 1s infinite;
        }

        .agent-card-name {
            flex: 1;
            min-width: 0;
            font-weight: 600;
            font-size: 13px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .agent-disabled-label {
            font-size: 9px;
            letter-spacing: 0.1em;
            font-weight: 600;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 1px 4px;
        }

        .agent-card-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            word-break: break-word;
        }

        .agent-cron {
            color: var(--text);
        }

        .agent-detail {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .agent-detail-label {
            font-size: 9px;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .agent-prompt {
            font-size: 11px;
            white-space: pre-wrap;
            word-break: break-word;
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 8px;
            margin-bottom: 10px;
        }

        .agent-field {
            font-size: 11px;
            color: var(--text-muted);
            word-break: break-all;
            margin-bottom: 4px;
        }

        .agent-error {
            font-size: 11px;
            color: var(--neon-coral);
            white-space: pre-wrap;
            word-break: break-word;
            margin-bottom: 10px;
        }

        .agent-session {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            padding: 6px 8px;
            font-size: 11px;
            cursor: pointer;
            border-left: 2px solid transparent;
        }

        .agent-session:hover {
            background: var(--bg-card);
            border-left-color: var(--neon-cyan);
        }

        .agent-session-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .agent-session-meta {
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .agents-note {
            line-height: 1.5;
            word-break: break-all;
        }

        /* Overrides .agents-note's break-all, which would split the words of a
           validation message mid-character. */
        .agents-warning {
            color: var(--neon-coral);
            white-space: pre-wrap;
            word-break: break-word;
            margin-top: 6px;
        }

        .agent-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .btn-agent {
            padding: 4px 10px;
            font-family: inherit;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.1em;
            background: var(--bg-card);
            border: 1px solid var(--border-strong);
            color: var(--text);
            cursor: pointer;
        }

        .btn-agent:hover {
            background: var(--text);
            color: var(--bg);
        }

        /* Declared after every rule it overrides so equal specificity still wins. */
        .hidden {
            display: none;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.visible {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border-strong);
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.1em;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
            font-family: inherit;
        }

        .modal-close:hover {
            color: var(--text);
        }

        .api-endpoint {
            margin-bottom: 24px;
        }

        .api-endpoint h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .api-method {
            padding: 2px 6px;
            font-size: 11px;
            font-weight: 600;
        }

        .api-method.get {
            background: var(--neon-mint);
            color: var(--text);
        }

        .api-method.post {
            background: var(--neon-cyan);
            color: var(--text);
        }

        .api-endpoint p {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 12px;
        }

        .api-curl {
            background: var(--bg-input);
            border: 1px solid var(--border);
            padding: 12px;
            font-size: 12px;
            overflow-x: auto;
            white-space: pre;
        }

        .api-response {
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .api-response summary {
            cursor: pointer;
            margin-bottom: 8px;
        }

        .api-response pre {
            background: var(--bg-input);
            border: 1px solid var(--border);
            padding: 12px;
            overflow-x: auto;
        }

        /* Agent editor form */

        /* The session drawer is at z-index 1001 and is still open behind the editor,
           so this overlay has to outrank it. */
        #agent-modal {
            z-index: 1100;
        }

        .form-field {
            margin-bottom: 14px;
        }

        .form-label {
            display: block;
            font-size: 9px;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            font-family: inherit;
            font-size: 13px;
            padding: 8px 10px;
            border: 1px solid var(--border-strong);
            background: var(--bg-input);
            color: var(--text);
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--neon-cyan);
        }

        .form-input[readonly] {
            border-color: var(--border);
            color: var(--text-muted);
        }

        .form-textarea {
            min-height: 220px;
            resize: vertical;
            line-height: 1.5;
        }

        .form-hint {
            font-size: 10px;
            line-height: 1.5;
            color: var(--text-muted);
            margin-top: 4px;
            word-break: break-word;
        }

        .form-row {
            display: flex;
            gap: 12px;
        }

        .form-row .form-field {
            flex: 1;
            min-width: 0;
        }

        .form-check {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .form-error {
            border-left: 3px solid var(--neon-coral);
            background: var(--bg-input);
            color: var(--neon-coral);
            font-size: 11px;
            line-height: 1.5;
            padding: 8px 10px;
            margin-bottom: 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .form-error.notice {
            border-left-color: var(--neon-yellow);
            color: var(--text);
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            border-top: 1px solid var(--border);
            padding-top: 14px;
        }

        .modal-actions-spacer {
            flex: 1;
        }

        .btn-form {
            padding: 8px 14px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid var(--border-strong);
            background: var(--bg);
            color: var(--text);
            cursor: pointer;

        }

        /* Responsive */
        @media (max-width: 600px) {
            html, body {
                overflow-x: hidden;

                font-size: 10px;
            }

            /* Session drawer mobile */
            .session-drawer {
                width: 85vw;
                max-width: 320px;
                left: -85vw;
            }

            .drawer-header {
                padding: 12px;

                gap: 10px;

        /* Markdown rendered content */
        .message.response .markdown-content {
            white-space: normal;
        }
        .message.response .markdown-content h1,
        .message.response .markdown-content h2,
        .message.response .markdown-content h3 {

        .message.response .markdown-content h2 { font-size: 1.2em; }

        .message.response .markdown-content ol {

        /* Tabbed content view for HTML/Markdown */
        .tabbed-content {
