                                console.error('[webapp] Failed to parse event:', parseErr, jsonStr);
                            }
                        }
                    }
                }
            } catch (err) {
                if (err.name === 'AbortError') return;
                console.error('[webapp] Error reconnecting to events:', err);
            } finally {
                if (reconnectController === controller) {
                    reconnectController = null;
                }
            }
        }

        // Sessions list (now the Sessions view). The drawer and its agents tab are gone.
        let currentSessionName = null;
        let persistenceEnabled = false;
        // Cache of the last /api/sessions payload so the filter box can re-render
        // client-side without a round trip on every keystroke.
        let allSessions = [];

        function runStatusMark(status) {
            // A switch rather than a lookup table: run_status arrives off the wire, and an
            // object lookup would resolve inherited keys like 'constructor' into a mark.
            let mark;
            switch (status) {
                case 'running':
                    mark = { cls: 'running', glyph: '●', title: 'Running now' };
                    break;
                case 'success':
                    mark = { cls: 'success', glyph: '✓', title: 'Run completed successfully' };
                    break;
                case 'failed':
                    mark = { cls: 'failed', glyph: '✗', title: 'Run failed' };
                    break;
                case 'interrupted':
                    mark = { cls: 'interrupted', glyph: '⊘', title: 'Interrupted — the server stopped while this run was still in flight' };
                    break;
                default:
                    // null for chats and for rows written before run_status existed, plus
                    // any status a newer binary knows and this page does not. No mark
                    // beats an unexplained one.
                    return '';
            }
            return `<span class="run-status ${mark.cls}" title="${escapeAttr(mark.title)}">${escapeHtml(mark.glyph)}</span>`;
        }

        function renderSessionItem(session) {
            // Agent runs lead with the agent name: a scheduled agent opens a fresh session
            // per run, so the generated session name says nothing about what ran. It drops
            // to the subline, where it is still available for identifying a specific run.
            const isAgentRun = !!session.agent_name;
            const primary = isAgentRun ? session.agent_name : session.name;
            const model = session.model ? escapeHtml(session.model) : '';
            const turns = escapeHtml(String(session.turn_count));
            const time = escapeHtml(session.relative_time || '');
            // session.preview may not be sent by /api/sessions yet — the em-dash keeps
            // the subline from collapsing to nothing when it isn't.
            const sub = isAgentRun ? `${escapeHtml(session.name)}` : (escapeHtml(session.preview || '') || '—');
            const activeCls = session.id === sessionId ? ' active' : '';
            return `
                <button class="row${activeCls}" data-id="${escapeAttr(session.id)}" data-name="${escapeAttr(session.name)}">
                    <span class="dot ${isAgentRun ? 'agent' : ''}"></span>
                    <span class="r-main">
                        <span class="r-name">${runStatusMark(session.run_status)}${escapeHtml(primary)}${isAgentRun ? '<span class="r-tag">agent</span>' : ''}</span>
                        <span class="r-prev">${sub}</span>
                    </span>
                    <span class="r-meta">
                        ${model ? `<span class="m-model">${model}</span>` : ''}
                        <span class="m-turns"><b>${turns}</b> turns</span>
                        <span>${time}</span>
                        <span class="row-del" data-del="${escapeAttr(session.id)}" title="Delete" role="button">✕</span>
                    </span>
                </button>`;
        }

        async function loadSessions() {
            try {
                const res = await fetch('/api/sessions');
                const data = await res.json();
                persistenceEnabled = data.persistent;
                allSessions = Array.isArray(data.sessions) ? data.sessions : [];
                paintSessions(allSessions);
            } catch (err) {
                console.error('[webapp] Failed to load sessions:', err);
                document.getElementById('session-list').innerHTML = '<div class="no-sessions">Failed to load sessions</div>';
            }
        }

        // Shared by loadSessions and renderSessionFilter so a live filter and a fresh
        // load render identically — one painter, two callers.
        function paintSessions(list) {
            const box = document.getElementById('session-list');
            const countEl = document.getElementById('session-count');
            const chats = list.filter(s => !s.agent_name);
            const runs = list.filter(s => s.agent_name);
            if (countEl) countEl.textContent = `${list.length} total${runs.length ? ` · ${runs.length} agent runs` : ''}`;
            if (list.length === 0) { box.innerHTML = '<div class="no-sessions">No sessions yet</div>'; return; }
            // Headers earn their space only when there are two kinds of thing to tell
            // apart. With no agents configured the list renders exactly as it did
            // before grouping existed — the untabbed state carries no affordance.
            const grouped = chats.length > 0 && runs.length > 0;
            box.innerHTML =
                (grouped ? '<div class="session-section">Chats</div>' : '') +
                chats.map(renderSessionItem).join('') +
                (grouped ? '<div class="session-section">Agent runs</div>' : '') +
                runs.map(renderSessionItem).join('');
            box.querySelectorAll('.row').forEach(row => {
                row.addEventListener('click', (e) => {
                    if (e.target.closest('.row-del')) { e.stopPropagation(); deleteSession(e.target.closest('.row-del').dataset.del); return; }
                    selectSession(row.dataset.id, row.dataset.name);
                });
            });
        }

        // Bound to #session-filter's input listener below; filters the cached list
        // client-side rather than re-fetching on every keystroke.
        function renderSessionFilter(term) {
            const t = (term || '').toLowerCase();
            const filtered = allSessions.filter(s => ((s.name || '') + (s.agent_name || '') + (s.preview || '')).toLowerCase().includes(t));
            paintSessions(filtered);
        }

        async function selectSession(id, name) {
            // A row is only clickable from the routed Sessions view, but the hash can
            // still say '#/agent/...' if this fires mid-navigation; picking a session
            // is an exit from the editor and clears the same guard as CANCEL.
            const leavingEditor = parseRoute().view === 'agent';
            if (leavingEditor && !await confirmLeaveAgentEditor()) return;

            stopReconnect();
            sessionId = id;
            currentSessionName = name;
            localStorage.setItem(SESSION_KEY, sessionId);
            localStorage.setItem(SESSION_NAME_KEY, name);
            if (leavingEditor) {
                // Tear the editor down before touching the hash: the hashchange this
                // fires runs the guard again, and it must not ask a second time.
                // updateSessionUrl deliberately will not write over an '#/agent/...' URL.
                closeAgentEditor();
                window.location.hash = '#/' + name;
            } else {
                updateSessionUrl(name);
            }

            // Clear messages, restore history, then attach to the live stream so a
            // scheduled run picked from the AGENTS tab is watchable while in flight.
            messagesEl.innerHTML = '';
            await restoreSessionHistory();
            reconnectToEvents();
        }

        async function deleteSession(id) {
            const confirmed = await confirmDialog({
                title: 'DELETE SESSION?',
                message: 'This session and everything in it are removed permanently.',
                confirmLabel: 'DELETE'
            });
            if (!confirmed) return;

            try {
                const res = await fetch('/api/session/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: id })
                });

                const data = await res.json();
                if (data.deleted) {
                    // If deleted current session, create new one
                    if (id === sessionId) {
                        await createNewSession();
                    }
                    loadSessions();
                }
            } catch (err) {
                console.error('[webapp] Failed to delete session:', err);
            }
        }

        async function createNewSession() {
            stopReconnect();
            try {
                const res = await fetch('/api/session/new', { method: 'POST' });
                const data = await res.json();

                sessionId = data.session_id;
                currentSessionName = data.session_name;
                localStorage.setItem(SESSION_KEY, sessionId);
                localStorage.setItem(SESSION_NAME_KEY, currentSessionName);
                updateSessionUrl(currentSessionName);

                // Clear messages
                messagesEl.innerHTML = '';
                queryInput.focus();
            } catch (err) {
                console.error('[webapp] Failed to create session:', err);
            }
        }

        // Update NEW button to use new session creation
        newBtn.addEventListener('click', async () => {
            stopReconnect();
            if (authenticatedUser) {
                // Authenticated user - clear server-side and get new session
                try {
                    const res = await fetch('/api/session/clear', { method: 'POST' });
                    const data = await res.json();
                    if (data.cleared && data.session_id) {
                        // Update to new session from server
                        sessionId = data.session_id;
                        currentSessionName = data.session_name;
                        localStorage.setItem(SESSION_KEY, sessionId);
                        localStorage.setItem(SESSION_NAME_KEY, currentSessionName);
                        updateSessionUrl(currentSessionName);
                        console.log('[webapp] New session created:', sessionId, currentSessionName);
                    }
                } catch (err) {
                    console.error('[webapp] Failed to clear session:', err);
                }
                messagesEl.innerHTML = '';
                loadSessions(); // Refresh session list
            } else {
                await createNewSession();
            }
            queryInput.focus();
        });

        // ---- AGENTS tab (read-only view of /api/agents) ----

        const AGENTS_REFRESH_MS = 30000;

        let agentsFile = null;
        let agentsRefreshTimer = null;
        let agentsEditable = false;
        let agentsServerModel = '';
        // IANA name of the zone the scheduler fires in, or null when the server could not
        // determine it. Null is not the same as "same as the browser" — see the fallback
        // note in renderCronPreview.
        let agentsServerTimezone = null;
        let agentsReloadError = null;
        // Set when EDIT or the enable/disable toggle fails before the editor can open;
        // such a failure has nowhere else to report itself, so it goes in the footer.
        let agentsActionError = null;
        // Fingerprint the list was loaded with; every edit is submitted against it so a
        // change made on disk in the meantime is rejected instead of overwritten.
        let agentsFingerprint = '';

        function startAgentsRefresh() {
            stopAgentsRefresh();
            agentsRefreshTimer = setInterval(() => loadAgents(), AGENTS_REFRESH_MS);
        }

        function stopAgentsRefresh() {
            if (agentsRefreshTimer !== null) {
                clearInterval(agentsRefreshTimer);
                agentsRefreshTimer = null;
            }
        }

        function formatDuration(seconds) {
            const total = Math.max(0, Math.round(seconds));
            if (total < 60) return `${total}s`;

            const minutes = Math.floor(total / 60);
            if (minutes < 60) return `${minutes}m`;

            const hours = Math.floor(minutes / 60);
            if (hours < 24) {
                const rem = minutes % 60;
                return rem ? `${hours}h ${rem}m` : `${hours}h`;
            }

            const days = Math.floor(hours / 24);
            const rem = hours % 24;
            return rem ? `${days}d ${rem}h` : `${days}d`;
        }

        // next_run_at / last_run_at are unix seconds, or null when unknown.
        function relativeFuture(unixSeconds) {
            if (typeof unixSeconds !== 'number' || !isFinite(unixSeconds)) return null;
            const delta = unixSeconds - Date.now() / 1000;
            return delta <= 0 ? 'due now' : `in ${formatDuration(delta)}`;
        }

        function relativePast(unixSeconds) {
            if (typeof unixSeconds !== 'number' || !isFinite(unixSeconds)) return null;
            const delta = Date.now() / 1000 - unixSeconds;
            return delta < 5 ? 'just now' : `${formatDuration(delta)} ago`;
        }

        // The agents surface is the full-width index painted by renderAgentIndex, whose
        // .card carries status via the enabled/disabled chip and the "check" error chip
        // rather than a status dot, so there is no agentDotClass equivalent to keep.

        // setAgentsActionError just records the error now; the drawer footer that used to
        // render it is gone. Task 4 surfaces action errors on the agents index.
        function setAgentsActionError(message) {
            agentsActionError = message || null;
        }

        // `force` is for the editor's own refreshes: a background refresh is skipped while
        // the editor is open so it cannot re-render the list underneath unsaved input or
        // replace the fingerprint the open form was loaded with.
        async function loadAgents(force = false) {
            if (agentEditorOpen && !force) return;

            try {
                const res = await fetch('/api/agents');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                // A server started without --agents has no Agents tab. Hide/show the
                // top-bar tab accordingly (replaces the old drawer tab toggle).
                document.getElementById('tab-agents-btn').style.display = data.agents_file ? '' : 'none';

                // A server started without --agents must look exactly as it did
                // before this tab existed, so hide it rather than showing it empty.
                if (!data.agents_file) {
                    agentsFile = null;
                    agentsEditable = false;
                    agentsFingerprint = '';
                    agentsReloadError = null;
                    return;
                }

                agentsFile = data.agents_file;
                agentsEditable = !!data.editable;
                agentsFingerprint = data.fingerprint || '';
                agentsReloadError = data.reload_error || null;
                agentsServerModel = data.server_model || '';
                agentsServerTimezone = data.server_timezone || null;

                // The index is rendered even while hidden, which costs nothing and means
                // it is already correct when the route switches to it.
                const agents = Array.isArray(data.agents) ? data.agents : [];
                renderAgentIndex(agents, agentsServerModel);
            } catch (err) {
                console.error('[webapp] Failed to load agents:', err);
                if (currentRouteView === 'agentIndex') {
                    agentIndexList.innerHTML = '<div class="agent-index-empty">Failed to load agents.</div>';
                }
            }
        }

        // ---- Cron preview ----
        //
        // CRON_MODULE_BEGIN (the test harness extracts everything down to CRON_MODULE_END)
        //
        // A hand-written 5-field cron parser and next-fire search. It deliberately does
        // not use a cron library, because every off-the-shelf one implements *Unix*
        // semantics and the server does not: src/agents.rs hands the expression to the
        // `cron` crate, which differs in two ways that change what actually fires.
        //
        //   1. Day-of-month and day-of-week are intersected, not unioned. `0 9 1 * 1`
        //      fires only on a 1st that is also a Monday; Unix cron fires on either.
        //      agents::restricts_both_day_fields exists to warn about exactly this.
        //   2. A wall-clock time that does not exist (a DST spring-forward gap) is
        //      skipped entirely: the crate maps candidates with `TimeZone::with_ymd_and_hms`
        //      and treats `LocalResult::None` as "not a candidate". A time that happens
        //      *twice* (a fall-back overlap) is `LocalResult::Ambiguous`, which the crate
        //      does fire — so `30 1 * * *` runs on the fall-back day in a zone whose
        //      clocks repeat 01:30, at the instant cronResolve picks below.
        //
        //      This is a behaviour change in the crate, not a choice made here. cron 0.12
        //      collapsed the result with `.single()`, so an overlap was `None` and the day
        //      was silently dropped — `0 2 * * *` in New York went from Oct 31 straight to
        //      Nov 2, and `30 1 1 11 *` skipped a whole year. 0.17 keeps the `Ambiguous`
        //      variant and fires it. The server runs 0.17, so this module follows 0.17.
        //
        // The search below mirrors cron::Schedule::next_after field by field — including
        // its stateful lower bounds — so that a divergence is a bug here, not a design
        // difference. Ordinals are stored in the *crate's* numbering, i.e. day-of-week
        // 1=Sunday..7=Saturday, which is what agents::normalize_cron translates the
        // user's Unix numbering (0=Sunday) into before the crate ever sees it.

        const CRON_MONTH_NAMES = {
            jan: 1, january: 1, feb: 2, february: 2, mar: 3, march: 3,
            apr: 4, april: 4, may: 5, jun: 6, june: 6, jul: 7, july: 7,
            aug: 8, august: 8, sep: 9, september: 9, oct: 10, october: 10,
            nov: 11, november: 11, dec: 12, december: 12
        };

        // Crate numbering, so these are the names the crate itself accepts, unshifted.
        const CRON_DAY_NAMES = {
            sun: 1, sunday: 1, mon: 2, monday: 2, tue: 3, tues: 3, tuesday: 3,
            wed: 4, wednesday: 4, thu: 5, thurs: 5, thursday: 5,
            fri: 6, friday: 6, sat: 7, saturday: 7
        };

        const CRON_DAY_LABELS = ['', 'Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const CRON_DAY_SHORT = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        const CRON_MONTH_LABELS = ['', 'January', 'February', 'March', 'April', 'May', 'June',
            'July', 'August', 'September', 'October', 'November', 'December'];
        const CRON_MONTH_SHORT = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

        // `min`/`max` are the crate's ordinal bounds; `userMin`/`userMax` are what the
        // user is allowed to type. They differ only for day-of-week, where the input is
        // Unix-numbered and `translate` performs the same remap as agents::translate_dow.
        // `any` marks the two fields the crate parses with `field_with_any`, i.e. the
        // only two where `?` is accepted.
        const CRON_FIELD_SPECS = [
            { key: 'minute', label: 'Minute', min: 0, max: 59, userMin: 0, userMax: 59, names: null, any: false },
            { key: 'hour', label: 'Hour', min: 0, max: 23, userMin: 0, userMax: 23, names: null, any: false },
            { key: 'dayOfMonth', label: 'Day-of-month', min: 1, max: 31, userMin: 1, userMax: 31, names: null, any: true },
            { key: 'month', label: 'Month', min: 1, max: 12, userMin: 1, userMax: 12, names: CRON_MONTH_NAMES, any: false },
            {
                key: 'dayOfWeek', label: 'Day-of-week', min: 1, max: 7, userMin: 0, userMax: 7,
                names: CRON_DAY_NAMES, any: true,
                translate: (n) => (n === 7 ? 1 : n + 1)
            }
        ];

        // How far ahead nextRuns() is willing to look. Sparse expressions can be years
        // out, and a text field that recomputes on every keystroke must never spin.
        const CRON_SEARCH_YEARS = 5;
        // The crate's own year ceiling; nothing fires past it however far we search.
        const CRON_MAX_YEAR = 2100;
        const CRON_DAY_MS = 86400000;

        function cronRange(from, to) {
            const out = [];
            for (let value = from; value <= to; value++) out.push(value);
            return out;
        }

        function cronPad(value) {
            return value < 10 ? `0${value}` : String(value);
        }

        // Parse one numeric token in the user's numbering and return it in the crate's.
        function cronOrdinal(text, spec) {
            const value = Number(text);
            if (!Number.isInteger(value) || value < spec.userMin || value > spec.userMax) {
                return { error: `${spec.label} must be ${spec.userMin}-${spec.userMax} (got ${text})` };
            }
            return { value: spec.translate ? spec.translate(value) : value };
        }

        function cronNamed(text, spec) {
            if (!spec.names) {
                return { error: `${spec.label} does not accept names (got '${text}')` };
            }
            const value = spec.names[text.toLowerCase()];
            if (value === undefined) {
                return { error: `${spec.label} does not recognise the name '${text}'` };
            }
            return { value };
        }

        // Returns { values, all, wildcard, step } or { error }. `step` is set only when
        // the entire field is a single `*/n`, which is what makes "Every 20 minutes"
        // safe to say.
        function cronParseField(text, spec) {
            const values = new Set();
            let wildcard = false;
            let step = null;

            const parts = text.split(',');
            for (const part of parts) {
                if (!part) {
                    return { error: `${spec.label} has an empty entry: '${text}'` };
                }

                const slash = part.indexOf('/');
                const head = slash === -1 ? part : part.slice(0, slash);
                const tail = slash === -1 ? null : part.slice(slash + 1);

                let stepSize = 1;
                if (tail !== null) {
                    if (!/^\d+$/.test(tail)) {
                        return { error: `${spec.label} step must be a whole number (got '${tail}')` };
                    }
                    stepSize = Number(tail);
                    if (stepSize === 0) {
                        return { error: `${spec.label} step cannot be zero` };
                    }
                }

                let base;
                if (head === '*' || (head === '?' && spec.any)) {
                    base = cronRange(spec.min, spec.max);
                    if (parts.length === 1) {
                        if (tail === null) wildcard = true;
                        else step = stepSize;
                    }
                } else if (head === '?') {
                    return { error: `${spec.label} does not accept '?' (only day-of-month and day-of-week do)` };
                } else if (/^\d+$/.test(head)) {
                    const point = cronOrdinal(head, spec);
                    if (point.error) return point;
                    // The crate reads a bare number before a step as "from here to the
                    // maximum", so `5/2` is not the same as `5`.
                    base = tail === null ? [point.value] : cronRange(point.value, spec.max);
                } else if (/^\d+-\d+$/.test(head)) {
                    const bounds = head.split('-');
                    const from = cronOrdinal(bounds[0], spec);
                    if (from.error) return from;
                    const to = cronOrdinal(bounds[1], spec);
                    if (to.error) return to;
                    if (from.value > to.value) {
                        return { error: `${spec.label} range runs backwards: '${head}'` };
                    }
                    base = cronRange(from.value, to.value);
                } else if (/^[A-Za-z]+-[A-Za-z]+$/.test(head)) {
                    const bounds = head.split('-');
                    const from = cronNamed(bounds[0], spec);
                    if (from.error) return from;
                    const to = cronNamed(bounds[1], spec);
                    if (to.error) return to;
                    if (from.value > to.value) {
                        return { error: `${spec.label} range runs backwards: '${head}'` };
                    }
                    base = cronRange(from.value, to.value);
                } else if (/^[A-Za-z]+$/.test(head)) {
                    // The crate's grammar puts names outside the `a/b` production, so a
                    // step after a bare name fails to parse rather than meaning anything.
                    if (tail !== null) {
                        return { error: `${spec.label} does not accept a step after a name (got '${part}')` };
                    }
                    const named = cronNamed(head, spec);
                    if (named.error) return named;
                    base = [named.value];
                } else {
                    return { error: `${spec.label} is not valid: '${part}'` };
                }

                // The crate steps by position over the sorted base set. Every base above
                // is a contiguous ascending range, so index stepping is value stepping.
                for (let i = 0; i < base.length; i += stepSize) values.add(base[i]);
            }

            const sorted = Array.from(values).sort((a, b) => a - b);
            return { values: sorted, all: sorted.length === spec.max - spec.min + 1, wildcard, step };
        }

        // parseCron('0 9 * * 1-5') -> { ok: true, fields: {...} }
        // parseCron('0 25 * * *')  -> { ok: false, error: 'Hour must be 0-23 (got 25)' }
        function parseCron(expr) {
            const text = expr === null || expr === undefined ? '' : String(expr).trim();
            const raw = text ? text.split(/\s+/) : [];
            if (raw.length !== 5) {
                return {
                    ok: false,
                    error: `Expected 5 fields (minute hour day-of-month month day-of-week), got ${raw.length}`
                };
            }

            const fields = {};
            for (let i = 0; i < CRON_FIELD_SPECS.length; i++) {
                const spec = CRON_FIELD_SPECS[i];
                const parsed = cronParseField(raw[i], spec);
                if (parsed.error) return { ok: false, error: parsed.error };
                fields[spec.key] = parsed;
            }

            return { ok: true, fields, raw };
        }

        // Mirrors agents::restricts_both_day_fields, which today only reaches the server
        // log. The intersection is occasionally what someone meant, so this warns.
        function cronRestrictsBothDayFields(expr) {
            const parsed = parseCron(expr);
            if (!parsed.ok) return false;
            const unrestricted = (f) => f === '*' || f === '?' || f.startsWith('*/');
            return !unrestricted(parsed.raw[2]) && !unrestricted(parsed.raw[4]);
        }

        function cronList(items, conjunction) {
            if (items.length === 1) return items[0];
            if (items.length === 2) return `${items[0]} ${conjunction} ${items[1]}`;
            return `${items.slice(0, -1).join(', ')} ${conjunction} ${items[items.length - 1]}`;
        }

        // Worth spelling out as a span only when it is long enough to be worth reading
        // as one, otherwise "Monday and Tuesday" beats "Monday through Tuesday".
        function cronSpan(values, labels) {
            const names = values.map((v) => labels[v]);
            const contiguous = values.length > 2 && values[values.length - 1] - values[0] === values.length - 1;
            return contiguous ? `${names[0]} through ${names[names.length - 1]}` : cronList(names, 'and');
        }

        function cronNth(n) {
            const tens = n % 100;
            if (tens >= 11 && tens <= 13) return `${n}th`;
            switch (n % 10) {
                case 1: return `${n}st`;
                case 2: return `${n}nd`;
                case 3: return `${n}rd`;
                default: return `${n}th`;
            }
        }

        function cronHourPhrase(hour) {
            if (hour.step) return `every ${hour.step} hours`;
            if (hour.values.length === 1) return `hour ${cronPad(hour.values[0])}`;
            return `hours ${cronList(hour.values.map(cronPad), 'and')}`;
        }

        function cronTimePhrase(fields) {
            const minute = fields.minute;
            const hour = fields.hour;

            if (minute.all && hour.all) return 'Every minute';
            if (hour.all) {
                if (minute.step) return `Every ${minute.step} minutes`;
                return `At ${cronList(minute.values.map((m) => `:${cronPad(m)}`), 'and')} past every hour`;
            }
            if (minute.all) return `Every minute of ${cronHourPhrase(hour)}`;

            const times = [];
            for (const h of hour.values) {
                for (const m of minute.values) times.push(`${cronPad(h)}:${cronPad(m)}`);
            }
            if (times.length <= 4) return `At ${cronList(times, 'and')}`;
            return `At ${cronList(minute.values.map((m) => `:${cronPad(m)}`), 'and')} past ${cronHourPhrase(hour)}`;
        }

        function cronDayPhrases(fields) {
            const phrases = [];
            const dom = fields.dayOfMonth;
            const dow = fields.dayOfWeek;

            if (!dom.all) phrases.push(`on the ${cronList(dom.values.map(cronNth), 'and')}`);
            if (!dow.all) {
                const span = cronSpan(dow.values, CRON_DAY_LABELS);
                // Restricting both day fields is an intersection here, so the wording has
                // to say "only when" — "on the 1st, Monday" would read as the Unix union.
                phrases.push(dom.all ? span : `only when that falls on ${span}`);
            }
            if (!fields.month.all) phrases.push(`in ${cronSpan(fields.month.values, CRON_MONTH_LABELS)}`);
            return phrases;
        }

        // describeCron('0 9 * * 1-5') -> 'At 09:00, Monday through Friday'
        // Returns null for an expression that does not parse.
        function describeCron(expr) {
            const parsed = parseCron(expr);
            if (!parsed.ok) return null;
            return [cronTimePhrase(parsed.fields)].concat(cronDayPhrases(parsed.fields)).join(', ');
        }

        // A formatter is the only way to read an instant's wall clock in another zone,
        // so one is built per search and reused across every candidate.
        function cronZone(timeZone) {
            try {
                return new Intl.DateTimeFormat('en-US', {
                    timeZone,
                    hourCycle: 'h23',
                    year: 'numeric', month: '2-digit', day: '2-digit',
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                });
            } catch (err) {
                return null;
            }
        }

        function cronWallParts(instant, zone) {
            const at = {};
            for (const part of zone.formatToParts(new Date(instant))) {
                if (part.type !== 'literal') at[part.type] = part.value;
            }
            return {
                year: Number(at.year),
                month: Number(at.month),
                day: Number(at.day),
                // h23 should never produce 24, but a stray hour cycle would corrupt the
                // whole search rather than a single field, so it is folded here.
                hour: Number(at.hour) % 24,
                minute: Number(at.minute),
                second: Number(at.second)
            };
        }

        // A zone's wall clock at `instant`, encoded as a Date.UTC value. The difference
        // between this and `instant` is the zone's real offset at that moment — which is
        // the only way to obtain one, and why no fixed offset is ever assumed.
        function cronWallMs(instant, zone) {
            const at = cronWallParts(instant, zone);
            return Date.UTC(at.year, at.month - 1, at.day, at.hour, at.minute, at.second);
        }

        // Truncated to the second first, because the formatter reports no finer than that
        // and a sub-second instant would otherwise report an offset carrying the leftover
        // milliseconds — enough to make the bisect below non-monotonic.
        function cronOffset(instant, zone) {
            const whole = Math.floor(instant / 1000) * 1000;
            return cronWallMs(whole, zone) - whole;
        }

        // The first instant in (lo, hi] whose offset is the later one. Called only when
        // the two ends of the window disagree, so exactly one transition is being
        // bisected. A window containing two transitions would land on one of them; zones
        // do not switch twice within two days, so that case is not reachable in practice.
        function cronTransition(lo, hi, lateOffset, zone) {
            // Down to the millisecond: the caller compares the boundary for equality, so
            // landing a fraction of a second late would silently miss it.
            while (hi - lo > 1) {
                const mid = lo + Math.floor((hi - lo) / 2);
                if (cronOffset(mid, zone) === lateOffset) hi = mid;
                else lo = mid;
            }
            return hi;
        }

        // The inverse of cronWallMs: a wall clock back to the instant the crate would fire
        // at, or null for a wall clock it refuses. It reproduces what
        // `TimeZone::with_ymd_and_hms` answers for the zone, reduced to the one value
        // cron's iterator actually consumes — `Single(t)` and `Ambiguous(t, _)` both fire
        // at `t`, `None` is skipped.
        //
        // Both special cases hang off the transition instant, so it is bisected for rather
        // than assumed, and both are inclusive of a boundary that a naive reading would put
        // outside. Measured against chrono::Local rather than reasoned about:
        //
        //   Spring forward (offset rises at T). Nothing exists strictly between the wall
        //   clocks T+early and T+late, so those are `None`. The two boundaries themselves
        //   both answer `Single(T)`: chrono reads the wall time the *stale* offset puts on
        //   T as still resolvable, which is why New York's 02:00 on the spring-forward day
        //   resolves at all, to the instant the clock shows as 03:00.
        //
        //   Fall back (offset drops at T). Every wall clock in T+late..T+early happens
        //   twice and is `Ambiguous`, and — again because of the stale-offset read — the
        //   upper boundary is included even though that time is really unique (New York's
        //   02:00 on the fall-back day). chrono orders the pair by offset, not by instant,
        //   putting the *post*-transition reading first, so the fired instant is
        //   `wallMs - late`: the second time the clock passes that reading.
        //
        // Getting this wrong is worth two headline bugs: under the old `.single()` reading
        // `0 2 * * *` in New York skipped Nov 1 entirely and `30 1 1 11 *` skipped a year.
        function cronResolve(wallMs, zone) {
            const earlyEnd = wallMs - CRON_DAY_MS;
            const lateEnd = wallMs + CRON_DAY_MS;
            const early = cronOffset(earlyEnd, zone);
            const late = cronOffset(lateEnd, zone);

            if (early !== late) {
                const transition = cronTransition(earlyEnd, lateEnd, late, zone);
                if (late > early) {
                    if (wallMs === transition + early) return transition;
                } else if (wallMs >= transition + late && wallMs <= transition + early) {
                    return wallMs - late;
                }
            }

            const found = [];
            const offsets = early === late ? [early] : [early, late];
            for (const offset of offsets) {
                const instant = wallMs - offset;
                if (cronWallMs(instant, zone) === wallMs && found.indexOf(instant) === -1) {
                    found.push(instant);
                }
            }
            return found.length === 1 ? found[0] : null;
        }

        function cronLeapYear(year) {
            return year % 4 === 0 && (year % 100 !== 0 || year % 400 === 0);
        }

        function cronDaysInMonth(month, year) {
            if (month === 2) return cronLeapYear(year) ? 29 : 28;
            return month === 4 || month === 6 || month === 9 || month === 11 ? 30 : 31;
        }

        // The crate's weekday ordinal (Sunday = 1) for a wall-clock date. Resolution never
        // moves the date, so this is the same answer the crate gets from the resolved
        // candidate — and it is available before the formatter round trip.
        function cronWeekday(year, month, day) {
            return new Date(Date.UTC(year, month - 1, day)).getUTCDay() + 1;
        }

        // cron::NextAfterQuery. The first pass through each unit starts at the instant
        // being searched from; every later pass starts at that unit's minimum. Reaching a
        // unit resets the finer ones, which is what makes the nested loops walk forward.
        function cronQuery(start) {
            return {
                firstMonth: true, firstDay: true, firstHour: true, firstMinute: true, firstSecond: true,
                month() { if (this.firstMonth) { this.firstMonth = false; return start.month; } return 1; },
                day() { if (this.firstDay) { this.firstDay = false; return start.day; } return 1; },
                hour() { if (this.firstHour) { this.firstHour = false; return start.hour; } return 0; },
                minute() { if (this.firstMinute) { this.firstMinute = false; return start.minute; } return 0; },
                second() { if (this.firstSecond) { this.firstSecond = false; return start.second; } return 0; },
                resetMonth() { this.firstMonth = false; this.resetDay(); },
                resetDay() { this.firstDay = false; this.resetHour(); },
                resetHour() { this.firstHour = false; this.resetMinute(); },
                resetMinute() { this.firstMinute = false; this.resetSecond(); },
                resetSecond() { this.firstSecond = false; }
            };
        }

        // The next instant at or after `afterMs + 1s` that the server would fire on, or
        // null once `maxYear` is passed. Stepping year -> month -> day -> hour -> minute
        // rather than by minutes is what keeps `0 0 29 2 *` from taking two million
        // iterations to answer.
        function cronNextAfter(fields, afterMs, zone, maxYear) {
            // agents::normalize_cron pins the seconds field to 0. It still has to take
            // part in the search: starting mid-minute puts the second lower bound past 0,
            // which is what makes the current minute drop out instead of matching again.
            const seconds = [0];

            const start = cronWallParts(afterMs + 1000, zone);
            const query = cronQuery(start);

            for (let year = start.year; year <= maxYear; year++) {
                const monthStart = query.month();
                if (fields.month.values.indexOf(monthStart) === -1) query.resetMonth();

                for (const month of fields.month.values) {
                    if (month < monthStart) continue;

                    const dayStart = query.day();
                    if (fields.dayOfMonth.values.indexOf(dayStart) === -1) query.resetDay();
                    const dayEnd = cronDaysInMonth(month, year);
                    const dayLow = Math.min(dayStart, dayEnd);

                    dayLoop:
                    for (const day of fields.dayOfMonth.values) {
                        if (day < dayLow || day > dayEnd) continue;

                        const hourStart = query.hour();
                        if (fields.hour.values.indexOf(hourStart) === -1) query.resetHour();

                        for (const hour of fields.hour.values) {
                            if (hour < hourStart) continue;

                            const minuteStart = query.minute();
                            if (fields.minute.values.indexOf(minuteStart) === -1) query.resetMinute();

                            for (const minute of fields.minute.values) {
                                if (minute < minuteStart) continue;

                                const secondStart = query.second();
                                if (seconds.indexOf(secondStart) === -1) query.resetSecond();

                                for (const second of seconds) {
                                    if (second < secondStart) continue;

                                    // Day-of-week gates the whole day, and it is an AND
                                    // with day-of-month, not the OR a crontab would do.
                                    if (fields.dayOfWeek.values.indexOf(cronWeekday(year, month, day)) === -1) {
                                        continue dayLoop;
                                    }

                                    const instant = cronResolve(Date.UTC(year, month - 1, day, hour, minute, second), zone);
                                    if (instant === null) continue;
                                    return instant;
                                }
                                query.resetMinute();
                            }
                            query.resetHour();
                        }
                        query.resetDay();
                    }
                    query.resetMonth();
                }
            }

            return null;
        }

        // nextRuns('0 9 * * 1-5', Date.now(), 'America/Los_Angeles', 3)
        //   -> { ok: true, runs: [<ms>, <ms>, <ms>], exhausted: false }
        // `exhausted` means the search hit its horizon, not that the expression is wrong.
        //
        // DELIBERATE DIVERGENCE — do not "fix" this back. Each run here is the crate's
        // *first* answer for the instant before it, i.e. `schedule.after(t).next()`, which
        // is the only value the server ever reads: scheduler.rs takes one element and then
        // re-derives the next from the run it just performed. cron 0.17's iterator does
        // something else with the rest — on an `Ambiguous` result it stashes the second
        // reading and yields it next, so the sequence walks *backwards* through a fall-back
        // hour and then repeats forever (`0 2 * * *` in New York yields 07:00Z, 06:00Z,
        // 07:00Z, ... , and 06:00Z is not even an 02:00). That is an upstream bug, and
        // reproducing it here would put times in the preview that no run will ever happen
        // at. So the crate is matched one call at a time and the tail is left strictly
        // increasing. The guard below is what pins that down.
        function nextRuns(expr, fromInstant, timeZone, count) {
            const parsed = parseCron(expr);
            if (!parsed.ok) return { ok: false, error: parsed.error };

            const zone = cronZone(timeZone);
            if (!zone) return { ok: false, error: `Unknown timezone '${timeZone}'` };

            // Fixed against the starting instant so asking for more runs cannot quietly
            // extend the horizon past what the first answer was computed under.
            const maxYear = Math.min(cronWallParts(fromInstant, zone).year + CRON_SEARCH_YEARS, CRON_MAX_YEAR);

            const runs = [];
            let after = fromInstant;
            for (let i = 0; i < count; i++) {
                const next = cronNextAfter(parsed.fields, after, zone, maxYear);
                if (next === null) return { ok: true, runs, exhausted: true };
                // cronResolve always answers an overlap with its later reading, and the
                // search only ever moves the wall clock forward, so this cannot trip for
                // any zone in the database. It is here so that a zone that did manage it
                // would stop the list rather than print a run before the one above it.
                if (runs.length && next <= runs[runs.length - 1]) {
                    return { ok: true, runs, exhausted: true };
                }
                runs.push(next);
                after = next;
            }
            return { ok: true, runs, exhausted: false };
        }

        // 'Tue Jul 22, 09:00' — built by hand because the parts of a formatted date, not
        // its punctuation, are what has to be pinned across locales. A sparse expression
        // can fire years out, so the year is spelled out whenever it is not this one.
        function cronStamp(instant, zone) {
            const at = cronWallParts(instant, zone);
            const weekday = CRON_DAY_SHORT[cronWeekday(at.year, at.month, at.day) - 1];
            const year = at.year === cronWallParts(Date.now(), zone).year ? '' : ` ${at.year}`;
            return `${weekday} ${CRON_MONTH_SHORT[at.month - 1]} ${at.day}${year}, ${cronPad(at.hour)}:${cronPad(at.minute)}`;
        }
        //
        // CRON_MODULE_END

        const agentFormSchedulePreview = document.getElementById('agent-form-schedule-preview');

        // Recomputed on every keystroke. Everything it calls is bounded, so there is no
        // debounce: a half-typed expression is cheap to reject and a complete one is a
        // few thousand comparisons at worst.
        function renderCronPreview() {
            const expr = agentFormSchedule.value.trim();
            agentFormSchedulePreview.classList.toggle('hidden', !expr);
            if (!expr) {
                agentFormSchedulePreview.innerHTML = '';
                return;
            }

            const parsed = parseCron(expr);
            if (!parsed.ok) {
                agentFormSchedulePreview.innerHTML =
                    `<div class="cron-line cron-bad"><span class="cron-mark">&#10007;</span>${escapeHtml(parsed.error)}</div>`;
                return;
            }

            const lines = [
                `<div class="cron-line cron-good"><span class="cron-mark">&#10003;</span>${escapeHtml(describeCron(expr))}</div>`
            ];

            // Cron fires in the server's zone. Falling back to the browser's silently
            // would show a confidently wrong time on any remote host, so the fallback
            // says so.
            const zoneName = agentsServerTimezone || Intl.DateTimeFormat().resolvedOptions().timeZone;
            const zoneLabel = agentsServerTimezone ? 'server time' : 'assuming your local time';
            const now = Date.now();
            const result = nextRuns(expr, now, zoneName, 1);

            if (!result.ok) {
                lines.push(`<div class="cron-line cron-detail">${escapeHtml(result.error)}</div>`);
            } else if (!result.runs.length) {
                lines.push(`<div class="cron-line cron-detail">No run in the next ${CRON_SEARCH_YEARS} years.</div>`);
            } else {
                const at = result.runs[0];
                const stamp = `${cronStamp(at, cronZone(zoneName))} ${zoneLabel}`;
                lines.push(`<div class="cron-line cron-detail">Next run in ${escapeHtml(formatDuration((at - now) / 1000))} (${escapeHtml(stamp)})</div>`);
            }

            if (cronRestrictsBothDayFields(expr)) {
                lines.push('<div class="cron-line cron-warn"><span class="cron-mark">&#9888;</span>' +
                    'Both day fields are restricted. Unix cron would fire on either. This fires only when both match.</div>');
            }

            agentFormSchedulePreview.innerHTML = lines.join('');
        }

        // ---- Agent editor ----

        const agentPage = document.getElementById('agent-page');
        const agentPageTitle = document.getElementById('agent-page-title');
        const agentPageForm = document.getElementById('agent-page-form');
        const agentPageMissing = document.getElementById('agent-page-missing');
        const agentPageMissingText = document.getElementById('agent-page-missing-text');
        const agentPageMissingBackBtn = document.getElementById('agent-page-missing-back');
        const agentPageBackBtn = document.getElementById('agent-page-back');
        const agentFormName = document.getElementById('agent-form-name');
        const agentFormNameHint = document.getElementById('agent-form-name-hint');
        const agentFormSchedule = document.getElementById('agent-form-schedule');
        const agentFormPromptLabel = document.getElementById('agent-form-prompt-label');
        const agentFormPrompt = document.getElementById('agent-form-prompt');
        const agentFormPromptHint = document.getElementById('agent-form-prompt-hint');
        const agentFormModel = document.getElementById('agent-form-model');
        const agentFormModelHint = document.getElementById('agent-form-model-hint');
        const agentFormTimeout = document.getElementById('agent-form-timeout');
        const agentFormWorkingDir = document.getElementById('agent-form-working-dir');
        const agentFormEnabled = document.getElementById('agent-form-enabled');
        const agentFormError = document.getElementById('agent-form-error');
        const agentFormReloadBtn = document.getElementById('agent-form-reload');
        const agentFormDeleteBtn = document.getElementById('agent-form-delete');
        const agentFormCancelBtn = document.getElementById('agent-form-cancel');
        const agentFormSaveBtn = document.getElementById('agent-form-save');

        agentFormSchedule.addEventListener('input', renderCronPreview);

        const NAME_HINT_EDIT = 'Renaming is not supported: run state and past sessions are keyed to this name. Create a new agent to use a different one.';
        const NAME_HINT_NEW = 'Lowercase letters, digits and dashes, e.g. daily-digest. It cannot be changed once saved.';
        const DEFAULT_TIMEOUT_SECS = 600;

        let agentEditorOpen = false;
        let agentEditorTarget = null;      // null while creating
        let agentEditorPromptFile = null;  // set when the prompt lives outside agents.toml
        // The open form submits against the fingerprint it was opened with. A background
        // refresh that was already in flight can still land on agentsFingerprint, and
        // submitting that would defeat the conflict check.
        let agentEditorFingerprint = '';
        let agentDeleteArmed = false;
        // The form as it stood when the editor opened, or null when nothing is being
        // edited. Everything dirty-related is a comparison against this.
        let agentFormSnapshot = null;

        function agentFormValues() {
            return JSON.stringify([
                agentFormName.value,
                agentFormSchedule.value,
                agentFormPrompt.value,
                agentFormModel.value,
                agentFormTimeout.value,
                agentFormWorkingDir.value,
                agentFormEnabled.checked
            ]);
        }

        // Comparing values rather than tracking input events means typing a change and
        // undoing it by hand leaves the form clean, which is what a user expects.
        function agentFormDirty() {
            return agentEditorOpen && agentFormSnapshot !== null && agentFormValues() !== agentFormSnapshot;
        }

        // Every exit from the editor funnels through here. False means stay put.
        async function confirmLeaveAgentEditor() {
            if (!agentFormDirty()) return true;

            return await confirmDialog({
                title: 'DISCARD UNSAVED CHANGES?',
                message: 'This agent has unsaved changes. Leaving the editor throws them away.',
                confirmLabel: 'DISCARD'
            });
        }

        // kind: 'error' (coral), 'conflict' (offers RELOAD), 'notice', or null to clear.
        function setAgentFormMessage(message, kind) {
            agentFormError.textContent = message || '';
            agentFormError.classList.toggle('hidden', !message);
            agentFormError.classList.toggle('notice', kind === 'conflict' || kind === 'notice');
            agentFormReloadBtn.classList.toggle('hidden', kind !== 'conflict');
        }

        function disarmAgentDelete() {
            agentDeleteArmed = false;
            agentFormDeleteBtn.textContent = 'DELETE';
            agentFormDeleteBtn.classList.remove('armed');
        }

        function setAgentFormBusy(busy) {
            [agentFormSaveBtn, agentFormDeleteBtn, agentFormCancelBtn, agentFormReloadBtn].forEach(btn => {
                btn.disabled = busy;
            });
        }

        // Swaps whatever is on screen out for the editor page. The chat view, the sessions
        // view, the agent index and the editor are exactly-one-visible surfaces; every
        // entry point routes through showView().
        function showAgentPage() {
            showView('editor');
        }

        function showAgentIndexPage() {
            showView('agents');
        }

        // Hiding the index does not restore anything: applyRoute re-shows the right view.
        function hideAgentIndexPage() {
            agentIndexPage.classList.add('hidden');
        }

        const chatViewEl = document.getElementById('view-chat');
        const sessionsViewEl = document.getElementById('view-sessions');
        function setActiveTab(name){ // name: chat | sessions | agents
            document.querySelectorAll('.tab').forEach(t => t.setAttribute('aria-current', t.dataset.route === name ? 'page' : 'false'));
        }
        // Shows exactly one surface and lights the owning tab. <main> is hidden on the
        // agent routes so its flex:1 does not push the agent pages below the fold.
        function showView(name){
            const inMain = (name === 'chat' || name === 'sessions');
            document.querySelector('main').style.display = inMain ? '' : 'none';
            chatViewEl.classList.toggle('active', name === 'chat');
            sessionsViewEl.classList.toggle('active', name === 'sessions');
            agentIndexPage.classList.toggle('hidden', name !== 'agents');
            agentPage.classList.toggle('hidden', name !== 'editor');
            setActiveTab(name === 'editor' ? 'agents' : name);
        }

        // `detail` is an /api/agents/get payload, or null to open a blank create form.
        function showAgentEditor(detail) {
            const creating = !detail;

            agentEditorOpen = true;
            agentEditorTarget = creating ? null : detail.name;
            agentEditorPromptFile = creating ? null : (detail.prompt_file || null);
            agentEditorFingerprint = agentsFingerprint;

            agentPageTitle.textContent = creating ? 'NEW AGENT' : `EDIT AGENT: ${detail.name}`;
            agentFormName.value = creating ? '' : detail.name;
            agentFormName.readOnly = !creating;
            agentFormNameHint.textContent = creating ? NAME_HINT_NEW : NAME_HINT_EDIT;
            agentFormSchedule.value = creating ? '' : detail.schedule;
            agentFormPrompt.value = creating ? '' : detail.prompt;
            agentFormModel.value = creating ? '' : (detail.model || '');
            agentFormTimeout.value = creating ? String(DEFAULT_TIMEOUT_SECS) : String(detail.timeout_secs);
            agentFormWorkingDir.value = creating ? '' : (detail.working_dir || '');
            agentFormEnabled.checked = creating ? true : detail.enabled;

            if (agentEditorPromptFile) {
                agentFormPromptLabel.textContent = 'PROMPT FILE';
                agentFormPromptHint.textContent = `Saving writes ${agentEditorPromptFile}; agents.toml keeps the prompt_file reference.`;
            } else {
                agentFormPromptLabel.textContent = 'PROMPT';
                agentFormPromptHint.textContent = 'Stored inline in agents.toml.';
            }

            agentFormModelHint.textContent = agentsServerModel
                ? `Blank uses the server default (${agentsServerModel}).`
                : 'Blank uses the server default.';

            agentFormDeleteBtn.classList.toggle('hidden', creating);
            disarmAgentDelete();
            setAgentFormMessage('', null);
            setAgentFormBusy(false);

            renderCronPreview();
            agentPageForm.classList.remove('hidden');
            agentPageMissing.classList.add('hidden');
            // Snapshot last, once every field is populated — including the blank create
            // form, so an empty new agent is clean until something is typed into it.
            agentFormSnapshot = agentFormValues();
            showAgentPage();
            (creating ? agentFormName : agentFormSchedule).focus();
        }

        // A deep link to an agent that no longer exists resolves here rather than
        // dead-ending: the name is stated and the way back is one click.
        function showAgentNotFound(name) {
            agentEditorOpen = false;
            agentEditorTarget = null;
            agentEditorPromptFile = null;
            agentEditorFingerprint = '';
            agentFormSnapshot = null;

            agentPageTitle.textContent = 'AGENT NOT FOUND';
            agentPageMissingText.textContent =
                `No agent named '${name}' is configured. It may have been renamed or removed from agents.toml.`;
            agentPageForm.classList.add('hidden');
            agentPageMissing.classList.remove('hidden');
            showAgentPage();
        }

        // Resets editor state and hides the page. It does not navigate — the router calls
        // this when the route leaves the editor, and callers that want to leave navigate.
        function closeAgentEditor() {
            agentEditorOpen = false;
            agentEditorTarget = null;
            agentEditorPromptFile = null;
            agentEditorFingerprint = '';
            // Dropping the snapshot is what makes a closed editor unconditionally clean,
            // so the hashchange this close is usually followed by asks nothing.
            agentFormSnapshot = null;
            agentFormSchedulePreview.innerHTML = '';
            agentFormSchedulePreview.classList.add('hidden');
            // Just hide the editor; the caller's applyRoute/showView reveals the right view.
            agentPage.classList.add('hidden');
            disarmAgentDelete();
            setAgentFormMessage('', null);
        }

        async function fetchAgentDetail(name) {
            try {
                const res = await fetch('/api/agents/get', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const data = await res.json();
                agentsFingerprint = data.fingerprint || agentsFingerprint;

                if (!data.found || !data.agent) {
                    // Removed from the file since the list was rendered; the refresh
                    // makes that plain rather than opening an editor over nothing.
                    await loadAgents(true);
                    return null;
                }
                return data.agent;
            } catch (err) {
                console.error('[webapp] Failed to load agent:', err);
                setAgentsActionError(`Could not load '${name}': ${err.message}. This also happens when agents.toml on disk is invalid.`);
                return null;
            }
        }

        function agentSavePayload(detail, enabled) {
            return {
                original_name: detail.name,
                fingerprint: agentsFingerprint,
                name: detail.name,
                schedule: detail.schedule,
                prompt: detail.prompt,
                model: detail.model || '',
                enabled,
                timeout_secs: detail.timeout_secs,
                working_dir: detail.working_dir || ''
            };
        }

        // Posts an edit and reports the outcome in the editor. Every failure leaves the
        // editor open so nothing the user typed is lost. `successMessage` is what the
        // index says on arrival, and is built by the caller because only the caller still
        // knows the name — returning to the index clears the editor's copy of it.
        async function submitAgentEdit(url, payload, successMessage) {
            setAgentFormBusy(true);
            disarmAgentDelete();

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) {
                    setAgentFormMessage(`request failed: HTTP ${res.status}`, 'error');
                    return;
                }

                const data = await res.json();
                if (data.ok) {
                    agentsFingerprint = data.fingerprint || agentsFingerprint;
                    // What was typed is now on disk, so the exit below must not offer to
                    // discard it. A delete lands here too, and has nothing left to save.
                    agentFormSnapshot = null;
                    // Straight to returnToAgentIndex rather than leaveAgentEditor: the
                    // dirty guard has just been satisfied above and asking again could
                    // only produce a dialog offering to discard a saved change. The index
                    // route refetches on arrival, so no reload is needed here either.
                    returnToAgentIndex();
                    showToast(successMessage);
                    return;
                }

                // The server's validation messages are written for humans; show them as-is.
                setAgentFormMessage(data.error || 'the change was rejected', data.conflict ? 'conflict' : 'error');
            } catch (err) {
                setAgentFormMessage(`request failed: ${err.message}`, 'error');
            } finally {
                setAgentFormBusy(false);
            }
        }

        async function submitAgentForm() {
            // A blank or non-numeric timeout would fail JSON deserialization server-side
            // and come back as an unreadable 422, so it is caught here instead. The digits
            // test is what rejects '1e3' and '12abc', which parseInt would quietly read as
            // 1 and 12; type=number's min/step do not reject them either.
            const timeoutRaw = agentFormTimeout.value.trim();
            const timeoutSecs = /^\d+$/.test(timeoutRaw) ? Number(timeoutRaw) : NaN;
            if (!Number.isSafeInteger(timeoutSecs) || timeoutSecs <= 0) {
                setAgentFormMessage('timeout must be a whole number of seconds greater than zero', 'error');
                return;
            }

            // The typed name, not agentEditorTarget: a create has no target, and a rename
            // should confirm what the agent is now called.
            const name = agentFormName.value.trim();

            await submitAgentEdit('/api/agents/save', {
                original_name: agentEditorTarget,
                fingerprint: agentEditorFingerprint,
                name,
                schedule: agentFormSchedule.value.trim(),
                prompt: agentFormPrompt.value,
                model: agentFormModel.value.trim(),
                enabled: agentFormEnabled.checked,
                timeout_secs: timeoutSecs,
                working_dir: agentFormWorkingDir.value.trim()
            }, `Saved "${name}"`);
        }

        async function toggleAgentEnabled(name, enable) {
            setAgentsActionError(null);
            const detail = await fetchAgentDetail(name);
            if (!detail) return;

            try {
                const res = await fetch('/api/agents/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(agentSavePayload(detail, enable))
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const data = await res.json();
                if (data.ok) {
                    agentsFingerprint = data.fingerprint || agentsFingerprint;
                    await loadAgents(true);
                    return;
                }

                // A rejected toggle has nowhere to report itself in the list, so hand it
                // to the editor with the server's message. The URL is synced by hand
                // rather than by navigating, so a reload does not discard the message.
                window.history.pushState(null, '', agentRouteHash(name));
                // pushState fires no hashchange, so applyRoute never sees this URL; the
                // dirty guard has to be told about it or a rewind would restore the
                // hash this editor was opened over.
                appliedRouteHash = window.location.hash;
                showAgentEditor(detail);
                agentFormEnabled.checked = enable;
                setAgentFormMessage(data.error || 'the change was rejected', data.conflict ? 'conflict' : 'error');
            } catch (err) {
                console.error('[webapp] Failed to toggle agent:', err);
                setAgentsActionError(`Could not ${enable ? 'enable' : 'disable'} '${name}': ${err.message}`);
            }
        }

        // Offered after a conflict: picks up whatever is on disk now and hands back a
        // current fingerprint, without touching what the user has typed.
        async function reloadAgentsFromDisk() {
            setAgentFormBusy(true);
            try {
                await fetch('/api/agents/reload', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: '{}'
                });
                await loadAgents(true);
                // Adopt the fingerprint just read from disk, otherwise SAVE would still
                // be submitting the stale one this reload was offered to resolve. The
                // dirty snapshot is deliberately left alone: a reload keeps every field
                // the user typed, so it neither creates nor clears unsaved work.
                agentEditorFingerprint = agentsFingerprint;

                const suffix = agentsReloadError ? `\n\n${agentsReloadError}` : '';
                setAgentFormMessage(
                    'Reloaded from disk. Your changes above were kept — press SAVE to write them over the current file.' + suffix,
                    'notice'
                );
            } catch (err) {
                setAgentFormMessage(`reload failed: ${err.message}`, 'error');
            } finally {
                setAgentFormBusy(false);
            }
        }

        agentFormSaveBtn.addEventListener('click', submitAgentForm);
        agentFormReloadBtn.addEventListener('click', reloadAgentsFromDisk);
        agentFormCancelBtn.addEventListener('click', leaveAgentEditor);
        agentPageBackBtn.addEventListener('click', leaveAgentEditor);
        agentPageMissingBackBtn.addEventListener('click', leaveAgentEditor);

        agentFormDeleteBtn.addEventListener('click', () => {
            if (!agentEditorTarget) return;

            if (!agentDeleteArmed) {
                agentDeleteArmed = true;
                agentFormDeleteBtn.textContent = 'CONFIRM DELETE';
                agentFormDeleteBtn.classList.add('armed');
                setAgentFormMessage(
                    `Deleting '${agentEditorTarget}' removes it from agents.toml. Sessions it already ran are kept.`,
                    'notice'
                );
                return;
            }

            submitAgentEdit('/api/agents/delete', {
                name: agentEditorTarget,
                fingerprint: agentEditorFingerprint
            }, `Deleted "${agentEditorTarget}"`);
        });

        // ---- Agent index page ----
        //
        // Full-width cards, one per agent, each carrying a 24h cron strip (agentStrip
        // below) so the schedule reads visually instead of only as text.

        const agentIndexPage = document.getElementById('agent-index-page');
        const agentIndexList = document.getElementById('agent-index-list');
        const agentIndexNote = document.getElementById('agent-index-note');
        const agentIndexNewBtn = document.getElementById('agent-index-new-btn');
        const agentIndexBackBtn = document.getElementById('agent-index-back');

        // describeCron returns null for anything it cannot parse, but agents.toml is
        // arbitrary text and the JS parser is not the authority — the server is — so an
        // expression this cannot read is expected, not exceptional. Either outcome falls
        // back to the raw expression, and the throw is caught so one odd agent cannot
        // take the rest of the list down with it.
        function agentScheduleDescription(schedule) {
            try {
                return describeCron(schedule) || null;
            } catch (err) {
                console.error('[webapp] Failed to describe cron:', schedule, err);
                return null;
            }
        }

        // The 24h tick-strip. The mark is the agent's next fire, mapped to its local
        // hour-of-day; disabled or unparseable agents render the strip without a mark.
        function agentStrip(agent) {
            let ticks = '';
            for (let h = 0; h <= 24; h += 6) {
                const left = (h / 24 * 100).toFixed(2);
                ticks += `<span class="q" style="left:${left}%"></span><span class="lbl" style="left:${left}%">${String(h).padStart(2,'0')}</span>`;
            }
            const now = new Date();
            const nowPos = ((now.getHours() + now.getMinutes()/60) / 24 * 100).toFixed(2);
            let mark = '';
            if (agent.enabled) {
                const zone = agentsServerTimezone || Intl.DateTimeFormat().resolvedOptions().timeZone;
                const res = nextRuns(agent.schedule, Date.now(), zone, 1);
                if (res.ok && res.runs && res.runs.length) {
                    const parts = cronWallParts(res.runs[0], cronZone(zone));
                    const pos = ((parts.hour + parts.minute/60) / 24 * 100).toFixed(2);
                    const hhmm = `${String(parts.hour).padStart(2,'0')}:${String(parts.minute).padStart(2,'0')}`;
                    mark = `<span class="mark" style="left:${pos}%"><span class="t">${hhmm}</span></span>`;
                }
            }
            return `<div class="strip">${ticks}<span class="now" style="left:${nowPos}%"></span>${mark}</div>`;
        }

        function renderAgentIndexRow(agent, serverModel) {
            const model = agent.model ? escapeHtml(agent.model) : `${escapeHtml(serverModel)} (default)`;
            const nextRun = agent.enabled ? (relativeFuture(agent.next_run_at) || '—') : 'disabled';
            const last = relativePast(agent.last_run_at);
            const lastCls = agent.last_error ? 'err' : 'ok';
            const lastTxt = agent.last_error ? `error · ${last || 'recently'}` : (last ? `ok · ${last}` : 'never run');
            const human = agentScheduleDescription(agent.schedule);
            return `
                <div class="card${agent.enabled ? '' : ' disabled'}" data-name="${escapeAttr(agent.name)}">
                    <div class="card-top">
                        <span class="a-name">${escapeHtml(agent.name)}</span>
                        <span class="chip ${agent.enabled ? 'on' : 'off'}">${agent.enabled ? 'enabled' : 'disabled'}</span>
                        ${agent.last_error ? '<span class="chip err">check</span>' : ''}
                    </div>
                    <div class="a-desc">${escapeHtml(agent.prompt_preview || '')}</div>
                    ${agentStrip(agent)}
                    <div class="a-foot">
                        <span class="cron">${escapeHtml(agent.schedule)} · ${escapeHtml(human || '')}</span>
                        <span class="next">next run <b>${escapeHtml(nextRun)}</b></span>
                        <span class="last ${lastCls}">last: ${escapeHtml(lastTxt)}</span>
                        <span class="a-model">${model}</span>
                    </div>
                </div>`;
        }

        function renderAgentIndex(agents, serverModel) {
            agentIndexNewBtn.classList.toggle('hidden', !agentsEditable);

            if (agents.length === 0) {
                agentIndexList.innerHTML =
                    `<div class="agent-index-empty">No agents configured.${agentsEditable ? ' Use + NEW AGENT to add one.' : ''}</div>`;
            } else {
                agentIndexList.innerHTML = agents.map(agent => renderAgentIndexRow(agent, serverModel)).join('');

                // Only editable configs get click targets: the editor route bounces
                // straight back out when the server says the file is read-only, so a
                // clickable card there would just flicker.
                if (agentsEditable) {
                    agentIndexList.querySelectorAll('.card').forEach(c => {
                        c.addEventListener('click', () => navigateToAgent(c.dataset.name));
                    });
                }
            }

            let note = `Agents are configured in ${escapeHtml(agentsFile || '')}.`;
            if (agentsReloadError) {
                note += `<div class="agents-warning">agents.toml on disk is invalid and was not loaded; the previously loaded config is still running.\n${escapeHtml(agentsReloadError)}</div>`;
            }
            agentIndexNote.innerHTML = note;
            agentIndexNote.classList.remove('hidden');
        }

        // Shown before the fetch resolves, so a deep link has something other than a
        // blank page while /api/agents is in flight.
        function showAgentIndexLoading() {
            agentIndexList.innerHTML = '<div class="agent-index-empty">Loading&hellip;</div>';
            agentIndexNote.classList.add('hidden');
            agentIndexNewBtn.classList.add('hidden');
        }

        agentIndexNewBtn.addEventListener('click', () => navigateToAgent(null));
        // The index has no form to guard, so it leaves for chat directly rather than
        // through leaveAgentEditor.
        agentIndexBackBtn.addEventListener('click', () => navigateToChat());

        // ---- Routing ----
        //
        // Four hash routes share one entry point, so a deep link, a refresh and the back
        // button all resolve through the same code:
        //
        //   #/<session-name>   chat
        //   #/agent/           agent index
        //   #/agent/<name>     agent editor
        //   #/agent/new        agent editor, creating
        //
        // Segment count is what tells a session apart from an agent, which is only safe
        // because generated session names are two-word slugs that never contain '/'.

        let currentRouteView = null;

        function parseRoute(hash) {
            hash = (hash === undefined) ? window.location.hash : hash;
            const path = hash.startsWith('#/') ? hash.substring(2) : '';
            const segments = path.split('/').filter(s => s.length > 0);
            if (segments.length === 2 && segments[0] === 'agent') {
                const name = decodeURIComponent(segments[1]);
                return { view: 'agent', name: name === 'new' ? null : name };
            }
            // Agents index tab; accept legacy '#/agent/' too.
            if (segments.length === 1 && (segments[0] === 'agents' || segments[0] === 'agent')) {
                return { view: 'agentIndex' };
            }
            if (segments.length === 1 && segments[0] === 'sessions') {
                return { view: 'sessions' };
            }
            // Chat, optionally naming a session. 'chat' is the bare-chat alias.
            // Known edge: a session literally named 'chat', 'sessions' or 'agents' is not
            // URL-openable — generated two-word slug names never collide with these.
            const seg = segments.length === 1 ? decodeURIComponent(segments[0]) : null;
            return { view: 'chat', session: (seg === 'chat') ? null : seg };
        }

        // `name` of null is the create route.
        function agentRouteHash(name) {
            return '#/agent/' + encodeURIComponent(name === null ? 'new' : name);
        }

        // Navigation is the entry point to the editor; the router does the fetching.
        function navigateToAgent(name) {
            const target = agentRouteHash(name);
            if (window.location.hash === target) {
                // An unchanged hash fires no hashchange, so re-route by hand.
                applyRoute();
            } else {
                window.location.hash = target;
            }
        }

        function navigateToAgentIndex() {
            const target = '#/agent/';
            if (window.location.hash === target) {
                applyRoute();
            } else {
                window.location.hash = target;
            }
        }

        // Returns to the chat view. Only the index's own '← CHAT' and the two routes that
        // bail out when the server has no agents at all end up here; every exit from the
        // editor lands on the agent index instead.
        function navigateToChat() {
            const target = currentSessionName ? '#/' + currentSessionName : '';
            if (target && window.location.hash !== target) {
                window.location.hash = target;
                return;
            }

            // Either there is no session to name or the hash is already right; neither
            // case fires hashchange, so the route has to be applied by hand.
            if (!target) {
                window.history.pushState(null, '', window.location.pathname);
            }
            applyRoute();
        }
